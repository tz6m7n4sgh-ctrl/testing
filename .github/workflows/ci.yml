name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Check lockfile sync
        run: npm ci --dry-run --ignore-scripts --no-audit --no-fund
      - run: npm ci
      - run: npm run health
      - run: npm run ops:check
      - run: npm test
      - run: npm run build
