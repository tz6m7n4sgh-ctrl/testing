<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0a1f17"/>
<meta name="application-name" content="World Cup 2026"/>
<meta name="apple-mobile-web-app-title" content="World Cup 2026"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>

<title>World Cup 2026</title>
<style>
/* ===== Part 1: design tokens + mobile-first CSS (RTL-aware) ===== */
:root{
  --pitch:#0a1f17; --pitch2:#10362a; --line:#1d4a3a;
  --grass:#19c37d; --grass-d:#0f9d63;
  --gold:#f5c451; --gold-d:#caa033;
  --ink:#0c1512; --paper:#f6f8f7; --card:#ffffff; --muted:#5f7068;
  --soft:#eef2f0; --border:#dde6e2; --bad:#e2574c; --good:#19a96b; --warn:#e8a23b;
  --r:16px; --r-sm:10px; --shadow:0 2px 10px rgba(10,31,23,.08); --shadow-lg:0 8px 30px rgba(10,31,23,.16);
  --tap:46px; --maxw:1180px;
  --sans:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,"Noto Sans Arabic",sans-serif;
  --num:"SF Mono",ui-monospace,"Roboto Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); background:var(--paper); color:var(--ink);
  line-height:1.45; font-size:15px;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
  overflow-x:hidden;
}
[dir="rtl"]{font-family:var(--sans)}
.num{font-family:var(--num);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:var(--grass-d);text-decoration:none}
h1,h2,h3,h4{margin:0;line-height:1.2}
.hide{display:none!important}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 16px}


/* ===== v28 PWA install support ===== */
.install-banner{display:none;position:fixed;left:12px;right:12px;bottom:calc(82px + env(safe-area-inset-bottom));z-index:55;background:linear-gradient(135deg,#071510,#123c2c);color:#fff;border:1px solid rgba(255,255,255,.14);box-shadow:var(--shadow-lg);border-radius:20px;padding:12px;align-items:center;gap:10px}
.install-banner.show{display:flex}
.install-banner .txt{flex:1;min-width:0}
.install-banner .title{font-weight:1000}
.install-banner .sub{color:#d7f5e6}
.pwa-status{font-size:11px;font-weight:900;border-radius:999px;padding:3px 8px;background:rgba(255,255,255,.14);color:#d7f5e6}
@media(min-width:900px){.install-banner{left:50%;right:auto;transform:translateX(-50%);width:min(560px,calc(100% - 32px));bottom:96px}}

/* Top bar */
.topbar{
  position:sticky;top:0;z-index:40;background:var(--pitch);color:#fff;
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
  display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);
}
.topbar .brand{font-weight:800;font-size:16px;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
.topbar .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--grass);box-shadow:0 0 0 4px rgba(25,195,125,.25)}
.topbar .spacer{flex:1}
.iconbtn{
  min-width:var(--tap);height:36px;padding:0 12px;border-radius:999px;
  background:rgba(255,255,255,.12);color:#fff;font-weight:700;font-size:13px;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
}
.iconbtn:active{transform:scale(.96)}
.iconbtn.gold{background:var(--gold);color:#3a2c05}

/* Phase strip */
.phase{
  background:linear-gradient(180deg,var(--pitch2),var(--pitch));color:#cdeee0;
  padding:8px 14px;font-size:12.5px;display:flex;gap:10px;align-items:center;justify-content:center;
  border-bottom:1px solid var(--line);
}
.phase b{color:#fff}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin:12px 0}
.card.flat{box-shadow:none}
.card h3{font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sub{color:var(--muted);font-size:12.5px}
.row{display:flex;align-items:center;gap:10px}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.grid{display:grid;gap:10px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:var(--soft);font-size:12px;font-weight:600;color:var(--muted)}
.chip.on{background:var(--grass);color:#04150d}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.tag.api{background:#e7f0ff;color:#2b5fb8}.tag.adm{background:#fff0d6;color:#9a6a00}
.tag.pend{background:#eee;color:#777}.tag.corr{background:#ffe3df;color:#b53a2e}
.tag.paid{background:#e2f7ec;color:#0f8a55}.tag.unpaid{background:#fdeceb;color:#c5392c}

/* Stat tiles */
.stat{background:var(--soft);border-radius:var(--r-sm);padding:12px;text-align:center}
.stat .v{font-family:var(--num);font-size:22px;font-weight:800;color:var(--pitch)}
.stat .l{font-size:11.5px;color:var(--muted);margin-top:2px}
.stat.gold{background:linear-gradient(160deg,#fff6e0,#ffedc2);border:1px solid #f0dca0}
.stat.gold .v{color:var(--gold-d)}

/* Buttons */
.btn{min-height:var(--tap);padding:0 16px;border-radius:12px;background:var(--grass);color:#04150d;font-weight:800;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:var(--soft);color:var(--ink)}
.btn.gold{background:var(--gold);color:#3a2c05}
.btn.bad{background:var(--bad);color:#fff}
.btn.sm{min-height:38px;font-size:13px;width:auto;padding:0 14px}
.btn[disabled]{opacity:.5;pointer-events:none}

/* Leaderboard rows */
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r-sm);background:var(--card);border:1px solid var(--border);margin:8px 0}
.lb-row .rank{font-family:var(--num);font-weight:800;font-size:17px;width:26px;text-align:center;color:var(--muted)}
.lb-row .nm{font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-row .pts{font-family:var(--num);font-weight:800;font-size:17px;color:var(--pitch)}
.lb-row.r1{border-color:var(--gold);background:linear-gradient(120deg,#fffdf5,#fff6e0)}
.lb-row.r1 .rank{color:var(--gold-d)}
.mv{font-family:var(--num);font-size:12px;font-weight:800;min-width:30px;text-align:center}
.mv.up{color:var(--good)}.mv.dn{color:var(--bad)}.mv.eq{color:var(--muted)}

/* Team flags + superhero avatars */
.player-inline{display:inline-flex;align-items:center;gap:10px;min-width:0;max-width:100%}
.player-inline .txt{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.avatar{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;position:relative;flex:none;color:#fff;font-weight:800;text-transform:uppercase;box-shadow:0 6px 16px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.9);overflow:hidden;isolation:isolate}
/* football-kit vertical stripe */
.avatar::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 0 38%, rgba(255,255,255,.16) 38% 50%, transparent 50% 62%, rgba(255,255,255,.16) 62% 74%, transparent 74%);mix-blend-mode:overlay}
.avatar .init{position:relative;z-index:2;letter-spacing:.02em;text-shadow:0 1px 2px rgba(0,0,0,.35);line-height:1}
/* squad number badge */
.avatar .kit-no{position:absolute;z-index:3;inset-block-end:-3px;inset-inline-end:-3px;min-width:1.4em;height:1.4em;padding:0 .22em;display:flex;align-items:center;justify-content:center;font-size:.5em;font-weight:800;border-radius:999px;background:#fff;color:var(--ink,#102019);box-shadow:0 2px 5px rgba(0,0,0,.3);border:1.5px solid rgba(0,0,0,.06)}
.avatar-sm{width:40px;height:40px;font-size:14px}
.avatar-lg{width:74px;height:74px;font-size:25px}
.avatar-lg .kit-no{font-size:.42em}
/* high-contrast football kit palettes (white initials remain legible on all) */
.avatar-theme-0{background:linear-gradient(140deg,#e11d48,#9f1239)}
.avatar-theme-1{background:linear-gradient(140deg,#1d4ed8,#1e3a8a)}
.avatar-theme-2{background:linear-gradient(140deg,#6d28d9,#4c1d95)}
.avatar-theme-3{background:linear-gradient(140deg,#c2410c,#7c2d12)}
.avatar-theme-4{background:linear-gradient(140deg,#047857,#064e3b)}
.avatar-theme-5{background:linear-gradient(140deg,#be185d,#831843)}
.avatar-theme-6{background:linear-gradient(140deg,#0e7490,#155e63)}
.avatar-theme-7{background:linear-gradient(140deg,#a16207,#713f12)}
.big-flag{font-size:1.55em;line-height:1;vertical-align:-0.12em;display:inline-block;margin-inline-end:3px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.12))}
.teams .big-flag{font-size:1.9em;vertical-align:-0.18em}
.gtable .big-flag,.barrow .big-flag{font-size:1.45em}

.pred-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:8px}
.pred-box{background:linear-gradient(180deg,#ffffff,#f7fbf8);border:1px solid var(--border);border-radius:15px;padding:9px 8px;min-height:78px;display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;text-align:center;box-shadow:0 3px 10px rgba(7,21,16,.04)}
.pred-box .pred-pos{font-family:var(--num);font-size:11px;font-weight:900;color:var(--muted);background:var(--soft);border-radius:999px;padding:2px 8px}
.pred-box .pred-team{font-weight:800;font-size:12.5px;line-height:1.25}
.pred-box.first{border-color:rgba(247,201,72,.75);background:linear-gradient(180deg,#fff8db,#ffffff)}
.pred-box.missing{border-style:dashed;color:var(--muted)}
.pred-group-title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:10px 0 6px}
.compare-panel{display:grid;gap:10px}
.compare-head{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center}
.compare-player{background:linear-gradient(180deg,#fff,#f7fbf8);border:1px solid var(--border);border-radius:18px;padding:12px;display:flex;align-items:center;gap:10px;min-width:0}
.compare-player .info{min-width:0}.compare-player .name{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.compare-player .score{font-family:var(--num);font-weight:900;color:var(--grass-d)}
.compare-vs{font-family:var(--num);font-weight:900;color:var(--muted);background:var(--soft);border-radius:999px;padding:7px 10px}
.diff-card{border:1px solid var(--border);border-radius:16px;padding:11px;background:#fff}
.diff-card.same{background:#f4fbf7}.diff-card.different{background:#fffaf0;border-color:#f1d997}
.diff-title{font-weight:900;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.diff-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.diff-pick{background:var(--soft);border-radius:12px;padding:8px;font-size:12.5px;font-weight:700;min-height:42px}
.diff-pick b{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
@media(max-width:520px){.pred-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.compare-head{grid-template-columns:1fr}.compare-vs{text-align:center}.diff-row{grid-template-columns:1fr}}
.player-head{display:flex;align-items:center;gap:14px}
.player-meta{min-width:0;display:flex;flex-direction:column;gap:4px}
.lb-row .nm{display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden;white-space:nowrap}

/* Bottom nav */
.botnav{
  position:fixed;left:0;right:0;bottom:0;z-index:50;background:#fff;border-top:1px solid var(--border);
  display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
.botnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 1px;color:var(--muted);font-size:10px;font-weight:700;border-radius:12px;min-height:var(--tap);min-width:0}
.botnav button .ic{font-size:18px;line-height:1}
.botnav button.on{color:var(--grass-d)}
.botnav button.on .ic{transform:translateY(-1px)}

/* More menu sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(8,18,14,.5);z-index:60;display:none;align-items:flex-end}
.sheet-bg.open{display:flex}
.sheet{background:#fff;width:100%;max-width:min(var(--maxw),760px);margin:0 auto;border-radius:18px 18px 0 0;padding:8px 14px calc(18px + env(safe-area-inset-bottom));max-height:84vh;overflow:auto;animation:up .22s ease}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet .grab{width:40px;height:4px;border-radius:9px;background:#d6ded9;margin:8px auto 12px}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 8px;border-radius:12px;font-weight:600;border-bottom:1px solid var(--soft)}
.menu-item:active{background:var(--soft)}
.menu-item .ic{font-size:18px;width:24px;text-align:center}
.menu-item.adm{color:var(--gold-d)}

/* Tables → cards */
.gtable{width:100%;border-collapse:collapse;font-size:13px}
.gtable th,.gtable td{padding:7px 6px;text-align:center;border-bottom:1px solid var(--soft)}
.gtable th{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase}
.gtable td.tn{text-align:start;font-weight:700;display:flex;align-items:center;gap:6px}
.gtable tr.q1 td:first-child{box-shadow:inset 3px 0 0 var(--grass)}
.gtable tr.q2 td:first-child{box-shadow:inset 3px 0 0 #6fd3aa}
.pos{font-family:var(--num);width:18px;height:18px;line-height:18px;border-radius:5px;background:var(--soft);font-size:11px;font-weight:800;text-align:center}

/* Match / impact cards */
.match{border:1px solid var(--border);border-radius:var(--r-sm);padding:11px;margin:8px 0;background:#fff}
.match .head{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:6px}
.match-time{font-family:var(--num);font-weight:900;color:var(--pitch);background:var(--soft);border-radius:999px;padding:2px 8px;white-space:nowrap}
.teams{display:flex;align-items:center;justify-content:center;gap:10px;font-weight:700}
.teams .sc{font-family:var(--num);font-size:20px;font-weight:800;min-width:54px;text-align:center;background:var(--soft);border-radius:8px;padding:3px 8px}
.edge{margin-top:8px;font-size:12.5px;background:var(--soft);border-radius:8px;padding:7px 9px}
.edge b{color:var(--grass-d)}

/* SVG diagrams */
.diagram{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.barrow{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:12.5px}
.barrow .bn{width:92px;flex:none;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.barrow .bt{flex:1;height:14px;background:var(--soft);border-radius:7px;overflow:hidden}
.barrow .bf{height:100%;background:var(--grass);border-radius:7px}
.barrow .bv{font-family:var(--num);width:30px;text-align:end;font-weight:700;color:var(--muted)}

/* Bracket */
.bracket{display:flex;gap:14px;padding:6px 2px;min-width:max-content}
.bcol{display:flex;flex-direction:column;justify-content:space-around;gap:10px;min-width:150px}
.bcol h4{font-size:11px;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:4px}
.bmatch{background:#fff;border:1px solid var(--border);border-radius:9px;font-size:12px;overflow:hidden}
.bmatch .bt{padding:6px 8px;display:flex;justify-content:space-between;gap:6px}
.bmatch .bt+.bt{border-top:1px solid var(--soft)}
.bmatch .bt.win{background:#eafaf2;font-weight:800}

/* Inputs */
input,select,textarea{font-family:inherit;font-size:15px;width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:11px;background:#fff;color:var(--ink)}
textarea{min-height:96px;resize:vertical}
.score-in{width:54px;text-align:center;font-family:var(--num);font-weight:800;font-size:18px;padding:8px}
label{font-size:12.5px;color:var(--muted);font-weight:700;display:block;margin-bottom:5px}
.field{margin:10px 0}

/* States */
.state{text-align:center;padding:30px 16px;color:var(--muted)}
.spin{width:30px;height:30px;border:3px solid var(--soft);border-top-color:var(--grass);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.banner{padding:10px 12px;border-radius:11px;font-size:13px;font-weight:600;margin:10px 0;display:flex;gap:8px;align-items:center}
.banner.err{background:#fdeceb;color:#b53a2e}
.banner.warn{background:#fff6e6;color:#9a6a00}
.banner.ok{background:#e7f8ef;color:#0f8a55}
.banner.cache{background:#eef3ff;color:#3158a8}

/* Collapsible */
details.acc{border:1px solid var(--border);border-radius:var(--r-sm);margin:8px 0;background:#fff;overflow:hidden}
details.acc>summary{padding:12px;font-weight:700;list-style:none;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary::after{content:"▾";color:var(--muted);transition:.2s}
details.acc[open]>summary::after{transform:rotate(180deg)}
details.acc .body{padding:0 12px 12px}

/* Segmented */
.seg{display:flex;background:var(--soft);border-radius:11px;padding:3px;gap:3px;overflow-x:auto}
.seg button{flex:1;min-width:max-content;padding:8px 12px;border-radius:9px;font-weight:700;font-size:12.5px;color:var(--muted);white-space:nowrap}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}

/* AI */
.chips{display:flex;gap:7px;overflow-x:auto;padding:4px 0}
.chips button{white-space:nowrap;background:var(--soft);border-radius:999px;padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--ink)}
.ai-ans{background:var(--soft);border-radius:12px;padding:13px;white-space:pre-wrap;font-size:13.5px;margin-top:10px;line-height:1.55}
.voice-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}
.micbtn{min-height:46px;border-radius:14px;background:linear-gradient(135deg,#f7c948,#fff1b8);color:#4a3300;font-weight:900;padding:0 14px;display:inline-flex;align-items:center;gap:7px}
.micbtn.listening{background:linear-gradient(135deg,#ef4444,#fb7185);color:#fff;animation:pulseMic 1s infinite}
@keyframes pulseMic{0%{box-shadow:0 0 0 0 rgba(239,68,68,.35)}70%{box-shadow:0 0 0 12px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
.scenario-ai-box{border:1px solid rgba(34,199,122,.25);background:linear-gradient(180deg,#ffffff,#f1fff7);border-radius:20px;padding:14px;margin:12px 0}
.sim-table{display:grid;gap:8px;margin-top:10px}
.sim-row{display:grid;grid-template-columns:34px minmax(0,1fr) auto auto;gap:8px;align-items:center;border:1px solid var(--border);background:#fff;border-radius:14px;padding:8px}
.sim-row .delta.up{color:var(--good)}.sim-row .delta.down{color:var(--bad)}.sim-row .delta.same{color:var(--muted)}
.sim-row .name{font-weight:900;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scenario-chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:var(--soft);font-weight:800;font-size:12px;padding:6px 10px;margin:2px}
.ai-src{font-size:11px;color:var(--muted);margin-top:8px;font-style:italic}

/* RTL tweaks */
[dir="rtl"] .gtable td.tn{text-align:start}
[dir="rtl"] .lb-row .rank{text-align:center}
[dir="rtl"] .gtable tr.q1 td:first-child{box-shadow:inset -3px 0 0 var(--grass)}

@media(min-width:600px){ body{font-size:15.5px} .g3{grid-template-columns:repeat(3,1fr)} }

/* ===== Wide desktop/tablet layout ===== */
@media(min-width:900px){
  body{padding-bottom:24px;background:linear-gradient(180deg,#f6f8f7 0,#eef3f0 100%)}
  .wrap{padding-left:24px;padding-right:24px}
  .topbar{padding-left:24px;padding-right:24px}
  .topbar .brand{font-size:18px}
  .phase{border-radius:0 0 18px 18px;margin-bottom:8px}
  #view{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:16px;align-items:start;padding-top:8px}
  #view>.card{grid-column:span 6;margin:0}
  #view>.card:first-child{grid-column:1/-1}
  #view>details.acc{grid-column:span 6;margin:0}
  .card{padding:18px;border-radius:18px}
  .card h3{font-size:16px}

    border:1px solid rgba(16,32,25,.10)!important;

function analyticsEnabled(){
  return /^G-[A-Z0-9]+$/i.test(GA_MEASUREMENT_ID||'') && GA_MEASUREMENT_ID!=='G-XXXXXXXXXX';
}
function loadAnalytics(){
  if(!analyticsEnabled()||window.__gaLoaded) return;
  window.__gaLoaded=true;
  window.dataLayer=window.dataLayer||[];
  if(typeof window.gtag!=='function'){
    window.gtag=function(){dataLayer.push(arguments);};
    gtag('js',new Date());
    gtag('config',GA_MEASUREMENT_ID,{
      send_page_view:false,
      anonymize_ip:true,
      cookie_flags:'SameSite=None;Secure'
    });
    const s=document.createElement('script');
    s.async=true;
    s.src='https://www.googletagmanager.com/gtag/js?id='+encodeURIComponent(GA_MEASUREMENT_ID);
    document.head.appendChild(s);
  }
}
function trackEvent(name,params){
  try{
    if(!analyticsEnabled()) return;
    loadAnalytics();
    gtag('event',name,Object.assign({
      app_version:'v33',
      app_language:LANG,
      app_view:APP.view||'dashboard',
      is_admin:!!APP.isAdmin
    },params||{}));
  }catch(_){}
}

function fetchWithTimeout(url, opts={}, ms=8000){
  const ctrl=new AbortController();
  const id=setTimeout(()=>ctrl.abort(), ms);
  const finalOpts={mode:'cors', credentials:'omit', ...opts, signal:ctrl.signal};
  return fetch(url,finalOpts).finally(()=>clearTimeout(id));
}

function ensureShape(d){

}



function currentMatchForTeams(group,home,away){
  const eh=teamCompareKey(home), ea=teamCompareKey(away);
  if(!eh||!ea) return null;
  const groups=group?[group]:GROUP_KEYS;
  for(const g of groups){
    for(let i=0;i<6;i++){
      const [mh,ma]=matchTeams(g,i);
      const kh=teamCompareKey(mh), ka=teamCompareKey(ma);
      if((kh===eh&&ka===ea)||(kh===ea&&ka===eh)){
        return {group:g,idx:i,key:matchKey(g,i),home:mh,away:ma,reversed:(kh===ea&&ka===eh)};
      }
    }
  }
  return null;
}
function resultFromStoredTeams(row,match){
  const hs=row.home_score, as=row.away_score;
  if(hs==null||as==null) return null;
  if(match&&match.reversed) return {home:String(as),away:String(hs)};
  return {home:String(hs),away:String(as)};
}

function normalizedResultToApp(row){
  if(!row) return null;
  if(row.status!=='final'||row.home_score==null||row.away_score==null) return null;

  // Important fix:
  // The schedule order can differ from the old local round-robin index.
  // Do not blindly trust match_key / match_idx when applying normalized results.
  // Resolve by stored home_team + away_team first, then orient the score to the
  // current app fixture order.
  const match=(row.home_team&&row.away_team)
    ? currentMatchForTeams(row.group_key,row.home_team,row.away_team)
    : null;

  if(match){
    return {
      key:match.key,
      result:resultFromStoredTeams(row,match),
      source:row.source||'api',
      resolved:true,
      storedKey:row.match_key||''
    };
  }

  if(!row.match_key) return null;
  return {
    key:row.match_key,
    result:{home:String(row.home_score),away:String(row.away_score)},
    source:row.source||'api',
    resolved:false,
    storedKey:row.match_key
  };
}
async function loadNormalizedResultsIntoApp(){
  APP._resultsTableStatus={ok:false, mode:'fallback-json'};
  try{
    const r=await fetchWithTimeout(RESULTS_Data+'?select=match_key,group_key,match_idx,home_team,away_team,home_score,away_score,status,source,updated_at&order=match_key.asc',{headers:H},10000);
    if(!r.ok){
      let txt=''; try{txt=await r.text();}catch(_){}
      throw new Error('Results table HTTP '+r.status+' '+txt.slice(0,160));
    }
    const rows=await r.json();
    APP._matchResultRows=Array.isArray(rows)?rows:[];

    const rebuiltResults={};
    const rebuiltMeta={};
    let applied=0, remapped=0, skipped=0;
    APP._matchResultRows.forEach(row=>{
      const x=normalizedResultToApp(row);
      if(x){
        rebuiltResults[x.key]=x.result;
        rebuiltMeta[x.key]=x.source;
        if(x.resolved && x.storedKey && x.storedKey!==x.key) remapped++;
        applied++;
      } else {
        skipped++;
      }
    });

    APP.data.groupResults={...(APP.data.groupResults||{}),...rebuiltResults};
    APP.data.resultMeta={...(APP.data.resultMeta||{}),...rebuiltMeta};

    APP._resultsTableStatus={ok:true, mode:'normalized-table', rows:APP._matchResultRows.length, applied, remapped, skipped, merged:true};
    return true;
  }catch(e){
    console.warn('Normalized results table unavailable. Falling back to wc2026.data.groupResults.',e);
    APP._resultsTableStatus={ok:false, mode:'fallback-json', error:String(e&&e.message?e.message:e)};
    return false;
  }
}
function normalizedResultRow(g,i,homeScore,awayScore,source,status){
  const [home,away]=matchTeams(g,i);
  return {
    match_key:matchKey(g,i),
    group_key:g,
    match_idx:i,
    home_team:home,
    away_team:away,
    home_score:homeScore==null?null:Number(homeScore),
    away_score:awayScore==null?null:Number(awayScore),
    status:status||((homeScore!=null&&awayScore!=null)?'final':'scheduled'),
    source:source||'admin',
    updated_by:APP.isAdmin?'admin':'system'
  };
}

    let c=null; try{ c=localStorage.getItem(CACHE_KEY); }catch(_){ c=null; }
    let parsed=null; if(c){ try{ parsed=JSON.parse(c); }catch(_){ parsed=null; } }
    if(parsed){ APP.data=ensureShape(parsed); APP.cached=true; APP.loaded=true; APP.error=navigator.onLine?'sync':'offline'; }
    else { APP.data=ensureShape({}); APP.loaded=true; APP.error='load'; }
  }

/* ================= team normalization ================= */
const _aliasIndex=(()=>{ const m={};
  for(const canon in TEAM_ALIASES){ m[norm(canon)]=canon; for(const a of TEAM_ALIASES[canon]) m[norm(a)]=canon; }
  return m;
})();
function norm(s){ return String(s==null?'':s).toLowerCase()
  .replace(/[._]/g,' ').replace(/&/g,' and ').replace(/[-–—]/g,' ')
  .replace(/[^\p{L}\p{N}\s]/gu,'').replace(/\s+/g,' ').trim(); }

/* canonical display name for a team string */
function canonTeam(team){
  if(team==null) return '';
  const n=norm(team);
  if(_aliasIndex[n]) return _aliasIndex[n];
  // try against GROUPS roster for canonical casing
  for(const g of GROUP_KEYS) for(const tm of GROUPS[g]) if(norm(tm)===n) return tm;
  return String(team).trim();
}
/* stable compare key — two names referring to same team share a key */
function teamCompareKey(team){ return norm(canonTeam(team)); }
function sameTeam(a,b){ return teamCompareKey(a)===teamCompareKey(b) && teamCompareKey(a)!==''; }

function hashCode(s){ s=String(s||''); let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h>>>0; }
function playerAvatar(name,size='sm'){ const h=hashCode(name||'player'); const theme=h%8, kitNo=(h%26)+1, initials=playerInitials(name); return `<span class="avatar avatar-${size} avatar-theme-${theme}" title="${esc(name||'Player')}"><span class="init">${esc(initials)}</span><span class="kit-no">${kitNo}</span></span>`; }

/* normalize a prediction (array OR object {1:..}) → array length up to 4 */
function normalizePrediction(pred){
  if(pred==null) return [];
  if(Array.isArray(pred)) return pred.filter(x=>x!=null&&x!=='').map(canonTeam);
  if(typeof pred==='object'){
    const out=[];
    for(let i=1;i<=4;i++){ if(pred[i]!=null&&pred[i]!=='') out[i-1]=canonTeam(pred[i]); }
    // fall back to any numeric-ish keys
    if(out.filter(Boolean).length===0){
      Object.keys(pred).sort().forEach(k=>{ if(pred[k]) out.push(canonTeam(pred[k])); });
    }
    return out.filter(Boolean);
  }
  return [];
}

/* tolerant access to a player's group prediction regardless of stored shape */
function playerGroupPred(playerData,group){
  if(!playerData) return [];
  // Existing database compatibility:
  // current app data uses player.groupPreds[group], while some prototypes used
  // player.groups / player.predictions / player.groupPredictions.
  const buckets=[
    playerData.groupPreds,
    playerData.groups,
    playerData.predictions,
    playerData.groupPredictions,
    playerData
  ];
  for(const b of buckets){
    if(b && b[group]!=null) return normalizePrediction(b[group]);
  }
  return [];
}
/* team at a given 1-based position in a prediction */
function groupPredPick(pred,pos){ const a=normalizePrediction(pred); return a[pos-1]||null; }
/* 1-based rank of a team within a player's group prediction, or 0 if absent */
function rankOfTeamInPred(playerData,group,team){
  const a=playerGroupPred(playerData,group);
  for(let i=0;i<a.length;i++) if(sameTeam(a[i],team)) return i+1;
  return 0;
}
/* which group a match belongs to, from a match key like "B_2" or {group} */
function groupForMatch(match){
  if(typeof match==='string'){
    const m=match.split('_');
    return m[0]||null;
  }
  if(match&&match.group) return match.group;
  if(!match) return null;

  // Important: many schedule/Data matches are plain objects like
  // {home:"Canada", away:"Bosnia-Herzegovina"} and do not carry a group.
  // Detect the group by comparing normalized team names against generated GM.
  const h=teamCompareKey(match.home);
  const a=teamCompareKey(match.away);
  if(!h||!a) return null;

  for(const g of GROUP_KEYS){
    for(let i=0;i<6;i++){
      const [mh,ma]=matchTeams(g,i);
      const kh=teamCompareKey(mh);
      const ka=teamCompareKey(ma);

      if((kh===h&&ka===a)||(kh===a&&ka===h)){
        return g;
      }
    }
  }

  return null;
}

/* player list helpers */
function playerNames(){ const d=APP.data||defaultData(); return Object.keys(d.players||{}); }
function getPlayer(name){ const d=APP.data||defaultData(); return (d.players||{})[name]||null; }

/* ================= Part 3: scoring, tables, schedule, audit, repair ================= */

/* ---- group match model ---- */
function matchTeams(group,idx){
  // Prefer saved/fetched schedule (real fixture order can differ from RR fallback).
  // Memoized by schedule-array reference and length, so it rebuilds only when the schedule changes.
  const sched=(APP&&APP.data&&Array.isArray(APP.data.scheduleMatches))?APP.data.scheduleMatches:null;
  if(sched){
    if(APP._mtSchedRef!==sched || APP._mtSchedLen!==sched.length){
      const map={};
      sched.forEach(x=>{
        if(x&&x.group!=null&&x.idx!=null&&x.home&&x.away){
          map[x.group+'_'+x.idx]=[canonTeam(x.home),canonTeam(x.away)];
        }
      });
      APP._mtMap=map;
      APP._mtSchedRef=sched;
      APP._mtSchedLen=sched.length;
    }
    const hit=APP._mtMap&&APP._mtMap[group+'_'+idx];
    if(hit) return hit;
  }
  const g=GROUPS[group]||[];
  const p=RR[idx];
  return p?[g[p[0]],g[p[1]]]:[null,null];
}
function matchKey(group,idx){ return group+'_'+idx; }
function readScore(res){
  if(!res) return null;
  const h=res.home, a=res.away;
  if(h==null||a==null||h===''||a==='') return null;
  const hs=Number(h), as=Number(a);
  if(!Number.isFinite(hs)||!Number.isFinite(as)) return null;
  return {hs,as};
}
function matchResult(group,idx){
  const [home,away]=matchTeams(group,idx);
  const d=APP.data||defaultData();
  const sc=readScore((d.groupResults||{})[matchKey(group,idx)]);
  if(!sc) return {home,away,complete:false};
  let winner=null,outcome='draw';
  if(sc.hs>sc.as){winner=home;outcome='home';} else if(sc.as>sc.hs){winner=away;outcome='away';}
  return {home,away,hs:sc.hs,as:sc.as,winner,outcome,complete:true};
}
function groupComplete(group){
  const matches=allSchedule().filter(m=>m&&m.group===group&&m.idx!==undefined&&m.idx!==null);
  if(matches.length>=6){
    return matches.every(m=>matchResult(group,m.idx).complete);
  }
  for(let i=0;i<6;i++) if(!matchResult(group,i).complete) return false;
  return true;
}
function completedMatchCount(){ if(!APP.data) return 0; let n=0; for(const g of GROUP_KEYS) for(let i=0;i<6;i++) if(matchResult(g,i).complete) n++; return n; }


function getGroupTeams(group){
  const teams=[];
  allSchedule().filter(m=>m&&m.group===group).forEach(m=>{
    if(m.home&&!teams.some(t=>sameTeam(t,m.home))) teams.push(canonTeam(m.home));
    if(m.away&&!teams.some(t=>sameTeam(t,m.away))) teams.push(canonTeam(m.away));
  });
  if(teams.length>=4) return teams.slice(0,4);
  return (GROUPS[group]||[]).filter(t=>t&&t!=='TBD');
}

/* ---- actual standings for a group ---- */
function computeGroupTable(group){
  const row={};
  function ensure(team){
    const tm=canonTeam(team);
    if(!tm) return null;
    const k=teamCompareKey(tm);
    if(!row[k]) row[k]={team:tm,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0};
    return row[k];
  }

  getGroupTeams(group).forEach(ensure);

  let matches=allSchedule().filter(m=>m&&m.group===group&&m.idx!==undefined&&m.idx!==null);
  if(!matches.length){
    matches=RR.map((_,i)=>{ const [home,away]=matchTeams(group,i); return {group,idx:i,home,away}; });
  }

  matches.forEach(m=>{
    const r=matchResult(group,m.idx);
    if(!r.complete) return;
    const H=ensure(m.home||r.home), A=ensure(m.away||r.away);
    if(!H||!A) return;
    const hs=Number(r.hs), as=Number(r.as);
    if(!Number.isFinite(hs)||!Number.isFinite(as)) return;
    H.P++;A.P++;
    H.GF+=hs;H.GA+=as; A.GF+=as;A.GA+=hs;
    if(hs>as){H.W++;A.L++;H.Pts+=3;}
    else if(as>hs){A.W++;H.L++;A.Pts+=3;}
    else {H.D++;A.D++;H.Pts++;A.Pts++;}
    H.GD=H.GF-H.GA;
    A.GD=A.GF-A.GA;
  });

  const arr=Object.values(row);
  arr.sort((a,b)=> b.Pts-a.Pts || b.GD-a.GD || b.GF-a.GF || a.team.localeCompare(b.team));
  return arr;
}

/* ---- predicted edge for a match by a player ---- */
function predictedEdge(playerData,group,home,away){
  const rh=rankOfTeamInPred(playerData,group,home);
  const ra=rankOfTeamInPred(playerData,group,away);
  if(!rh&&!ra) return {status:'none'};
  if(!rh||!ra) return {status:'missing',missing:!rh?home:away,rh,ra};
  if(rh===ra) return {status:'tie',rh,ra};
  return {status:'ok', edge: rh<ra?home:away, rh, ra};
}

/* ===== SINGLE SOURCE OF TRUTH: calcPlayerPoints ===== */
function calcPlayerPoints(playerData,groupResults,knockoutResults,champion){
  const detail={ matches:[], ranking:[], knockout:[], champion:null };
  let gMatch=0,gRank=0,ko=0,champ=0,gRankPending=false;

  for(const g of GROUP_KEYS){
    for(let i=0;i<6;i++){
      const r=matchResult(g,i); if(!r.complete) continue;
      const e=predictedEdge(playerData,g,r.home,r.away);
      let got=0,reason='';
      if(r.outcome==='draw'){ reason='draw_no_edge'; }
      else if(e.status==='ok'){ if(sameTeam(e.edge,r.winner)){got=SCORING.edgeCorrect;reason='edge_correct';} else reason='edge_wrong'; }
      else if(e.status==='missing'){ reason='missing_team'; }
      else if(e.status==='none'){ reason='no_pred'; }
      else reason='equal_rank';
      gMatch+=got;
      detail.matches.push({key:matchKey(g,i),group:g,idx:i,home:r.home,away:r.away,hs:r.hs,as:r.as,winner:r.winner,outcome:r.outcome,edge:e,got,reason});
    }
    // ranking points only when group complete
    if(groupComplete(g)){
      const table=computeGroupTableHome(g);
      const pred=playerGroupPred(playerData,g);
      for(let pos=0;pos<4;pos++){
        const actualTeam=table[pos]?table[pos].team:null;
        const predTeam=pred[pos]||null;
        let got=0,reason='miss';
        if(predTeam&&actualTeam&&sameTeam(predTeam,actualTeam)){got=SCORING.exactPosition;reason='exact';}
        else if(predTeam && table.some(rw=>sameTeam(rw.team,predTeam))){got=SCORING.teamInGroupWrongPos;reason='in_group';}
        gRank+=got;
        detail.ranking.push({group:g,pos:pos+1,predTeam,actualTeam,got,reason});
      }
    } else if(playerGroupPred(playerData,g).length){ gRankPending=true; }
  }

  // knockout
  const kr=knockoutResults||{};
  const kp=(playerData&&(playerData.knockout||playerData.knockoutPredictions))||{};
  for(const mid in kr){
    const actualW=kr[mid]; if(!actualW) continue;
    const round=(mid.split('_')[0]||'').toUpperCase();
    const val=SCORING.knockout[round]||0;
    const predW=kp[mid];
    const got=(predW&&sameTeam(predW,actualW))?val:0;
    ko+=got;
    detail.knockout.push({mid,round,predW:predW||null,actualW,got});
  }

  // champion
  if(champion){
    const pc=playerData&&playerData.champion;
    const got=(pc&&sameTeam(pc,champion))?SCORING.champion:0;
    champ=got;
    detail.champion={predW:pc||null,actual:champion,got};
  }

  return { total:gMatch+gRank+ko+champ, groupMatch:gMatch, groupRank:gRank, knockout:ko, champ, gRankPending, detail };
}

/* ---- leaderboard (uses calcPlayerPoints) ---- */
function invalidateLeaderboardCache(){ APP._lbCache=null; }
function buildLeaderboard(){
  if(APP._lbCache) return APP._lbCache;
  const rows=playerNames().map(name=>{
    const p=getPlayer(name);
    const c=calcPlayerPoints(p,APP.data.groupResults,APP.data.knockoutResults,APP.data.champion);
    return {name, ...c, paid:!!(p&&p.paid)};
  });
  rows.sort((a,b)=> b.total-a.total || a.name.localeCompare(b.name));
  rows.forEach((r,i)=>r.rank=i+1);
  APP._lbCache=rows;
  return rows;
}
function rankMovement(name){
  const cur=buildLeaderboard().find(r=>r.name===name);
  const prev=APP.prevRanks&&APP.prevRanks[name];
  if(!cur||!prev) return {dir:'eq',delta:0};
  const d=prev-cur.rank;
  return {dir:d>0?'up':d<0?'dn':'eq', delta:Math.abs(d)};
}
function snapshotRanks(){ const m={}; buildLeaderboard().forEach(r=>m[r.name]=r.rank); APP.prevRanks=m; localStorage.setItem('wc2026_ranks',JSON.stringify(m)); }

/* ---- prize pool ---- */
function prizePool(){ const fee=APP.data.settings.entryFeeAED||200; return playerNames().length*fee; }
function paidCounts(){ let paid=0; playerNames().forEach(n=>{if(getPlayer(n).paid)paid++;}); return {paid,unpaid:playerNames().length-paid}; }
function prizeSplit(){
  const pool=prizePool(), mode=APP.data.settings.distribution||'winnerTakesAll';
  const lb=buildLeaderboard();
  if(mode==='split2') return [{name:lb[0],share:.6},{name:lb[1],share:.4}].filter(x=>x.name).map(x=>({name:x.name.name,amount:Math.round(pool*x.share)}));
  if(mode==='split3') return [[lb[0],.5],[lb[1],.3],[lb[2],.2]].filter(x=>x[0]).map(x=>({name:x[0].name,amount:Math.round(pool*x[1])}));
  return lb[0]?[{name:lb[0].name,amount:pool}]:[];
}

function buildLocalSchedule(){ // synthesize from GROUPS so All-Matches always has data
  const out=[]; const start=new Date(WC_START+'T00:00:00Z');

    out.push({key:matchKey(g,i),group:g,idx:i,home:h,away:a,date:d.toISOString().slice(0,10),time:timeSlots[day%timeSlots.length],tz:'UAE',phase:'group'});
    day++;

}

function stableFixtureKey(group,home,away,eventId){
  if(eventId) return 'api_'+String(eventId);
  const pair=[teamCompareKey(home),teamCompareKey(away)].sort();
  return String(group)+'_'+pair[0]+'_'+pair[1];
}

function dateRange(a,b){ const out=[],d=new Date(a+'T00:00:00Z'),end=new Date(b+'T00:00:00Z');
  while(d<=end){ out.push(d.toISOString().slice(0,10)); d.setUTCDate(d.getUTCDate()+1);} return out; }
function uaeNowMs(){
  return Date.now();
}
function uaeToday(){
  const parts=new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Dubai',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date());
  const get=t=>parts.find(p=>p.type===t)?.value||'';
  return `${get('year')}-${get('month')}-${get('day')}`;
}
function toAmPmFromHHMM(hhmm){
  if(!hhmm) return '';
  const m=String(hhmm).match(/^(\d{1,2}):(\d{2})/);
  if(!m) return String(hhmm);
  let h=Number(m[1]), min=m[2], ampm=h>=12?'PM':'AM';
  h=h%12; if(h===0) h=12;
  return h+':'+min+' '+ampm;
}
function parseTimeTo24(time){
  if(!time) return null;
  const s=String(time).trim().toUpperCase();
  let m=s.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/);
  if(m){
    let h=Number(m[1]), min=Number(m[2]);
    if(m[3]==='PM'&&h<12) h+=12;
    if(m[3]==='AM'&&h===12) h=0;
    return {h,min};
  }
  m=s.match(/^(\d{1,2}):(\d{2})/);
  if(m) return {h:Number(m[1]),min:Number(m[2])};
  return null;
}
function matchUaeTimestamp(m){
  if(!m) return 0;
  const apiLike=!!(m.api||m.eventId||m.source==='live'||m.source==='api'||m.sourceDate||m.sourceTime||m.sourceTimestamp||m.strTimestamp);
  if(apiLike){
    const d=apiTimeToInstant(m);
    if(d) return d.getTime();
  }
  if(m.kickoffUtc){
    const ts=Date.parse(m.kickoffUtc);
    if(Number.isFinite(ts)) return ts;
  }
  if(!m.date) return 0;
  const tm=parseTimeTo24(m.time||m.strTime||'00:00');
  const h=tm?tm.h:0, min=tm?tm.min:0;
  return Date.UTC(Number(m.date.slice(0,4)),Number(m.date.slice(5,7))-1,Number(m.date.slice(8,10)),h-4,min,0);
}
function liveStatusText(s){
  s=String(s||'').toLowerCase();
  if(['ft','aet','pen','complete','completed','finished','match finished','final'].includes(s)) return 'final';
  if(['live','in play','1h','2h','ht','halftime'].includes(s)) return 'live';
  return 'scheduled';
}
function matchIsFinalStatus(m){ return liveStatusText(m&&m.status)==='final'; }
function matchIsLiveStatus(m){ return liveStatusText(m&&m.status)==='live'; }
function matchIsUpcoming(m){
  if(!m) return false;
  if(m.api){
    if(matchIsFinalStatus(m)) return false;
  }else if(m.group&&m.idx!=null&&matchResult(m.group,m.idx).complete) return false;
  const ts=matchUaeTimestamp(m);
  if(!ts) return true;
  return ts + 3*60*60*1000 >= uaeNowMs();
}
function pastUncompletedMatches(limit){
  const sched=(Array.isArray(APP.data.scheduleMatches)&&APP.data.scheduleMatches.length)?APP.data.scheduleMatches:buildLocalSchedule();
  return sched.filter(m=>m.group&&m.idx!=null&&!matchResult(m.group,m.idx).complete&&matchUaeTimestamp(m)&&matchUaeTimestamp(m)+3*60*60*1000<uaeNowMs())
    .sort((a,b)=>matchUaeTimestamp(a)-matchUaeTimestamp(b)).slice(0,limit||6);
}

function apiTimeToInstant(m){
  if(!m) return null;

  if(m.strTimestamp||m.sourceTimestamp){
    const d=new Date(m.strTimestamp||m.sourceTimestamp);
    if(Number.isFinite(d.getTime())) return d;
  }

  const sourceDate=m.dateEvent||m.sourceDate||m.apiDate||m.rawDate||'';
  const sourceTime=m.strTime||m.sourceTime||m.strEventTime||m.apiTime||m.rawTime||'';
  if(sourceDate&&sourceTime){
    const tm=parseTimeTo24(sourceTime);
    if(tm){
      const d=new Date(sourceDate+'T'+String(tm.h).padStart(2,'0')+':'+String(tm.min).padStart(2,'0')+':00Z');
      if(Number.isFinite(d.getTime())) return d;
    }
  }

  if(m.kickoffUtc){
    const d=new Date(m.kickoffUtc);
    if(Number.isFinite(d.getTime())) return d;
  }

  return null;
}
function formatInstantAsUae(d){
  if(!d||!Number.isFinite(d.getTime())) return null;
  const parts=new Intl.DateTimeFormat('en-CA',{
    timeZone:'Asia/Dubai',
    year:'numeric',
    month:'2-digit',
    day:'2-digit'
  }).formatToParts(d);
  const get=t=>parts.find(p=>p.type===t)?.value||'';
  const date=`${get('year')}-${get('month')}-${get('day')}`;
  const time=new Intl.DateTimeFormat('en-US',{
    timeZone:'Asia/Dubai',
    hour:'numeric',
    minute:'2-digit',
    hour12:true
  }).format(d);
  return {date,time,label:`${date} · ${time} UAE`};
}
function apiTimeToUaeLabel(m){
  const fmt=formatInstantAsUae(apiTimeToInstant(m));
  if(fmt) return cleanTimeZoneLabel(fmt.label);
  const d=(m&&m.uaeDate)||'';
  const t=(m&&m.uaeTime)||'';

function apiTimeSourceLabel(m){

  const sourceDate=m.dateEvent||m.sourceDate||m.apiDate||m.rawDate||'';

  if(sourceDate||sourceTime) return `${sourceDate}${sourceTime?' '+sourceTime:''} (dateEvent + strTime UTC)`.trim();
  if(m.kickoffUtc) return `${m.kickoffUtc} (normalized instant)`;
  return tl('Not provided by Data','غير متوفر من Data');
}
function normalizeSportsDbRow(row){

async function fetchFullSchedule(onProgress){
  const dates=dateRange(WC_START,WC_END); const all=[];
  for(let i=0;i<dates.length;i++){ const ev=await fetchDay(dates[i]); all.push(...ev);
    if(onProgress) onProgress(i+1,dates.length); }

/* ================= audit + data quality ================= */
function validateGroupPrediction(group,pred){
  const a=normalizePrediction(pred); const issues=[];
  const roster=(GROUPS[group]||[]).map(canonTeam);
  if(a.length===0){ issues.push({type:'nullPred'}); return issues; }
  if(a.length<4) issues.push({type:'only3',have:a.length});
  const seen={}; a.forEach(tm=>{ const k=teamCompareKey(tm); if(seen[k]) issues.push({type:'dupTeams',team:tm}); seen[k]=1; });
  a.forEach(tm=>{ if(!roster.some(r=>sameTeam(r,tm))) issues.push({type:'invalidTeam',team:tm}); });
  const missing=roster.filter(r=>!a.some(tm=>sameTeam(tm,r)));
  if(missing.length && a.length<4) issues.push({type:'missingPicks',missing});
  return issues;
}
function auditDataQuality(){
  const out=[];
  playerNames().forEach(name=>{ const p=getPlayer(name);
    GROUP_KEYS.forEach(g=>{
      const raw=(p.groupPreds&&p.groupPreds[g]) ??
        (p.groups&&p.groups[g]) ??
        (p.predictions&&p.predictions[g]) ??
        (p.groupPredictions&&p.groupPredictions[g]) ??
        p[g];

      const issues=validateGroupPrediction(g,raw);
      issues.forEach(is=>out.push({player:name,group:g,raw,issue:is}));
    });
  });
  return out;
}
function auditPlayer(name){
  const p=getPlayer(name); if(!p) return null;
  return { name, calc:calcPlayerPoints(p,APP.data.groupResults,APP.data.knockoutResults,APP.data.champion) };
}
function auditMatch(group,idx){
  const r=matchResult(group,idx); const rows=[];
  playerNames().forEach(name=>{ const p=getPlayer(name);
    const e=predictedEdge(p,group,r.home,r.away);
    let got=0; if(r.complete&&r.outcome!=='draw'&&e.status==='ok'&&sameTeam(e.edge,r.winner)) got=SCORING.edgeCorrect;
    rows.push({name,edge:e,got});
  });
  return {match:r,group,idx,rows};
}
function auditGroupRanking(group){
  const table=computeGroupTable(group), complete=groupComplete(group), rows=[];
  playerNames().forEach(name=>{ const p=getPlayer(name); const pred=playerGroupPred(p,group); const cells=[];
    for(let pos=0;pos<4;pos++){ const at=table[pos]?table[pos].team:null,pt=pred[pos]||null;
      let got=0,st='miss'; if(complete&&pt&&at&&sameTeam(pt,at)){got=SCORING.exactPosition;st='exact';}
      else if(complete&&pt&&table.some(rw=>sameTeam(rw.team,pt))){got=SCORING.teamInGroupWrongPos;st='in_group';}
      cells.push({pos:pos+1,pt,at,got,st}); }
    rows.push({name,cells});
  });
  return {group,table,complete,rows};
}
function buildPredictionAudit(){
  const lb=buildLeaderboard();
  return { players:lb, quality:auditDataQuality(),
    totalsMatch: lb.every(r=>r.total===r.groupMatch+r.groupRank+r.knockout+r.champ) };
}

/* ================= repair: missing team (append only) ================= */
function previewRepairMissingTeam(name,group){
  const p=getPlayer(name); if(!p) return null;
  const cur=playerGroupPred(p,group);
  const roster=(GROUPS[group]||[]).map(canonTeam);
  const missing=roster.filter(r=>!cur.some(tm=>sameTeam(tm,r)));
  if(cur.length>=4||missing.length===0) return {name,group,before:cur,after:cur,missing:[],noop:true};
  const after=cur.concat(missing).slice(0,4);
  return {name,group,before:cur,after,missing,noop:false};
}
function applyRepairMissingTeam(name,group){
  const pv=previewRepairMissingTeam(name,group); if(!pv||pv.noop) return false;
  backupBeforeRepair('repair');
  const p=getPlayer(name);

  // Existing database compatibility: write repairs to groupPreds first.
  // Do not create a separate groups object when groupPreds already exists.
  if(!p.groupPreds) p.groupPreds={};

  const before=p.groupPreds[group]!==undefined
    ? p.groupPreds[group]
    : (p.groups&&p.groups[group]!==undefined
        ? p.groups[group]
        : (p[group]!==undefined?p[group]:null));

  p.groupPreds[group]=pv.after;
  logAction('repair_missing_team','players.'+name+'.groupPreds.'+group, before, pv.after);
  return true;
}
function exportAudit(type){
  const a=buildPredictionAudit();
  const payload=type==='quality'?a.quality:a;
  return JSON.stringify(payload,null,2);
}

function parseDisplayTimeToUtcInstant(date,time){
  if(!date||!time) return null;
  const tm=parseTimeTo24(time);
  if(!tm) return null;
  const d=new Date(date+'T'+String(tm.h).padStart(2,'0')+':'+String(tm.min).padStart(2,'0')+':00Z');
  return Number.isFinite(d.getTime())?d:null;
}
function formatInstantInGst(d){
  if(!d||!Number.isFinite(d.getTime())) return null;
  const parts=new Intl.DateTimeFormat('en-CA',{
    timeZone:'Asia/Dubai',
    year:'numeric',
    month:'2-digit',
    day:'2-digit'
  }).formatToParts(d);
  const get=t=>parts.find(p=>p.type===t)?.value||'';
  const date=`${get('year')}-${get('month')}-${get('day')}`;
  const time=new Intl.DateTimeFormat('en-US',{
    timeZone:'Asia/Dubai',
    hour:'numeric',
    minute:'2-digit',
    hour12:true
  }).format(d);
  return {date,time,kickoffUtc:d.toISOString()};
}
function normalizeScheduleRowForGst(row){
  if(!row||typeof row!=='object') return row;
  const m={...row};
  const isApiLike=!!(m.api||m.eventId||m.source==='live'||m.source==='api');

  if(!isApiLike) return m;

  if(m.sourceTimestamp){
    const fmt=formatInstantInGst(new Date(m.sourceTimestamp));
    if(fmt){
      m.kickoffUtc=fmt.kickoffUtc;
      m.uaeDate=fmt.date;
      m.uaeTime=fmt.time;
      m.date=fmt.date;
      m.time=fmt.time;
      m.tz='GST';
      return m;
    }
  }

  if(m.kickoffUtc){
    const fmt=formatInstantInGst(new Date(m.kickoffUtc));
    if(fmt){
      m.uaeDate=fmt.date;
      m.uaeTime=fmt.time;
      m.date=fmt.date;
      m.time=fmt.time;
      m.tz='GST';
      return m;
    }
  }

  if(m.sourceDate&&m.sourceTime){
    const fmt=formatInstantInGst(parseDisplayTimeToUtcInstant(m.sourceDate,m.sourceTime));
    if(fmt){
      m.kickoffUtc=fmt.kickoffUtc;
      m.uaeDate=fmt.date;
      m.uaeTime=fmt.time;
      m.date=fmt.date;
      m.time=fmt.time;
      m.sourceTimeZone=m.sourceTimeZone||'UTC/GMT fallback';
      m.sourceLabel=m.sourceLabel||`${m.sourceDate} ${m.sourceTime}`;
      m.tz='GST';
      return m;
    }
  }

  // Last-resort migration for Data-like rows saved before source fields existed.
  // Treat their displayed date/time as the provider UTC time and convert to GST.
  if(m.date&&m.time){
    const originalDate=m.date;
    const originalTime=m.time;
    const fmt=formatInstantInGst(parseDisplayTimeToUtcInstant(originalDate,originalTime));
    if(fmt){
      m.kickoffUtc=fmt.kickoffUtc;
      m.sourceDate=m.sourceDate||originalDate;
      m.sourceTime=m.sourceTime||originalTime;
      m.sourceTimeZone=m.sourceTimeZone||'UTC/GMT fallback';
      m.sourceLabel=m.sourceLabel||`${originalDate} ${originalTime}`;
      m.uaeDate=fmt.date;
      m.uaeTime=fmt.time;
      m.date=fmt.date;
      m.time=fmt.time;
      m.tz='GST';
    }
  }

  return m;
}
function normalizeScheduleRowsForGst(rows){
  return (Array.isArray(rows)?rows:[]).map(normalizeScheduleRowForGst);

function apiGroupTableHome(g){
  const teams={};
  function ensure(t){
    const tm=canonTeam(t);
    if(!tm) return null;
    const k=teamCompareKey(tm);
    if(!teams[k]) teams[k]={team:tm,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0};
    return teams[k];
  }
  homeApiSchedule().filter(m=>m.group===g).forEach(m=>{ ensure(m.home); ensure(m.away); });
  apiHomeMatches().filter(m=>m.group===g).forEach(m=>{
    const H=ensure(m.home), A=ensure(m.away);
    if(!H||!A) return;
    const hs=Number(m.hs), as=Number(m.as);
    if(!Number.isFinite(hs)||!Number.isFinite(as)) return;
    H.P++; A.P++; H.GF+=hs; H.GA+=as; A.GF+=as; A.GA+=hs;
    if(hs>as){H.W++;A.L++;H.Pts+=3;}
    else if(as>hs){A.W++;H.L++;A.Pts+=3;}
    else{H.D++;A.D++;H.Pts++;A.Pts++;}
    H.GD=H.GF-H.GA; A.GD=A.GF-A.GA;
  });
  return Object.values(teams).sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF||a.team.localeCompare(b.team));
}

function uaeDateOffset(days){
  const base=new Date();
  const parts=new Intl.DateTimeFormat('en-CA',{
    timeZone:'Asia/Dubai',
    year:'numeric',
    month:'2-digit',
    day:'2-digit'
  }).formatToParts(base);
  const get=t=>parts.find(p=>p.type===t)?.value||'';
  const utcNoon=Date.UTC(Number(get('year')),Number(get('month'))-1,Number(get('day'))+Number(days||0),12,0,0);
  const shifted=new Date(utcNoon);
  const out=new Intl.DateTimeFormat('en-CA',{
    timeZone:'Asia/Dubai',
    year:'numeric',
    month:'2-digit',
    day:'2-digit'
  }).formatToParts(shifted);
  const val=t=>out.find(p=>p.type===t)?.value||'';
  return `${val('year')}-${val('month')}-${val('day')}`;
}

function playerPredictionSplit(m){

async function loadHomeApiUpdates(){
  APP._homeApiLoaded=false;
  APP._homeApiError=null;
  APP._homeApiDebug={days:0,events:0,completed:0,mapped:0,schedule:0,window:fetchWindowDates(),mode:'home-window'};
  try{
    const ev=await fetchHomeWindowEvents();
    APP._homeApiDebug.events=ev.length;
    APP._homeApiDebug.days=fetchWindowDates().length;

    const rows=scheduleRowsFromApiEvents(ev);
    APP._homeApiSchedule=rows;
    APP._homeApiDebug.schedule=rows.length;

    const out=[];
    ev.filter(sportsEventComplete).forEach(e=>{
      APP._homeApiDebug.completed++;
      const sched=rows.find(m=>m.eventId && String(m.eventId)===String(e.idEvent||e.idSoccerXML)) || null;
      const row=compareApiEventToApp(e);
      const m=(row&&row.match)?row.match:sched;
      const api=row&&row.api?row.api:sportsScore(e);
      if(m&&api){
        APP._homeApiDebug.mapped++;
        const hs=Number(api.home), as=Number(api.away);
        let winner=null,outcome='draw';
        if(hs>as){winner=m.home;outcome='home';}
        else if(as>hs){winner=m.away;outcome='away';}
        const meta=apiEventKickoffMeta(e);
        out.push({
          api:true,
          group:m.group||'TBD',
          idx:m.idx,
          key:m.key||matchKey(m.group||'TBD',m.idx||0),
          home:m.home||canonTeam(e.strHomeTeam),
          away:m.away||canonTeam(e.strAwayTeam),
          hs,as,winner,outcome,
          date:meta.uaeDate,
          time:meta.uaeTime,
          uaeDate:meta.uaeDate,
          uaeTime:meta.uaeTime,
          kickoffUtc:meta.kickoffUtc,
          sourceDate:meta.sourceDate,
          sourceTime:meta.sourceTime,
          sourceTimeZone:meta.sourceTimeZone,
          sourceTimestamp:meta.sourceTimestamp,
          sourceLocalDate:meta.sourceLocalDate,
          sourceLocalTime:meta.sourceLocalTime,
          sourceLabel:meta.sourceLabel,
          tz:'UAE',
          eventId:e.idEvent||e.idSoccerXML||null,
          status:e.strStatus||'Final',
          venue:e.strVenue||''
        });
      }
    });
    out.sort((a,b)=>matchUaeTimestamp(a)-matchUaeTimestamp(b));
    APP._homeApiResults=out;
    APP._homeApiLoaded=true;
  }catch(e){
    APP._homeApiSchedule=[];
    APP._homeApiResults=[];
    APP._homeApiLoaded=false;
    APP._homeApiError=String(e&&e.message?e.message:e);
    console.warn('Home live update failed',e);
  }
}

function matchCenterMatches(){
  const now=uaeNowMs();
  const lower=now-4*60*60*1000;      // keep matches that are currently live/recently kicked off
  const upper=now+30*60*60*1000;     // show tonight + early next day in UAE time
  let rows=homeSchedule()
    .filter(m=>m.group&&m.idx!=null)
    .filter(m=>{
      const ts=matchUaeTimestamp(m);
      if(!ts) return false;
      return ts>=lower && ts<=upper;
    })
    .sort((a,b)=>matchUaeTimestamp(a)-matchUaeTimestamp(b));

  // If the user's local day has no games in this window, still show the next upcoming games.
  if(!rows.length){
    rows=homeSchedule()
      .filter(m=>m.group&&m.idx!=null&&matchIsUpcoming(m))
      .sort((a,b)=>matchUaeTimestamp(a)-matchUaeTimestamp(b))
      .slice(0,6);
  }
  return rows.slice(0,8);
}
function allTodayApiMatches(){

    .filter(m=>m.group&&m.idx!=null)
    .filter(m=>(m.date||'')===today)

  return rows;
}
function todayApiMatches(){

function nextApiMatch(){

    .sort((a,b)=>matchUaeTimestamp(a)-matchUaeTimestamp(b))[0]||null;
}

function mostDividedTodayMatch(){

function biggestPredictionEdgeToday(){

  if(!today.length) return null;
  return today.map(dividedMatchScore).sort((a,b)=>{
    const am=Math.max(a.split.home.length,a.split.away.length,a.split.none.length);
    const bm=Math.max(b.split.home.length,b.split.away.length,b.split.none.length);
    return bm-am;
  })[0];

function hubMatchStatus(m){
  if(!m) return {key:'upcoming',label:tl('Upcoming','قادمة')};
  const sc=scoreFromAnySource(m);
  const rawStatus=String(m.status||'').toLowerCase();
  if(sc||['final','complete','completed','finished','ft','aet','pen'].includes(rawStatus)){
    return {key:'final',label:tl('Completed','مكتملة')};
  }
  const ts=matchUaeTimestamp(m);
  const now=uaeNowMs();
  if(ts && now>ts+130*60*1000) return {key:'past',label:tl('Past','سابقة')};
  if(ts && now>=ts && now<=ts+130*60*1000) return {key:'live',label:tl('Live','مباشرة')};
  if(ts && ts-now<=2*60*60*1000 && ts>now) return {key:'soon',label:tl('Starts soon','تبدأ قريباً')};
  return {key:'upcoming',label:tl('Upcoming','قادمة')};
}
function countdownText(m){
  const ts=matchUaeTimestamp(m);
  if(!ts) return '';
  const diff=ts-uaeNowMs();
  if(diff<=-130*60*1000) return tl('Finished / past window','انتهت / خارج النافذة');
  if(diff<=0) return tl('Kickoff window','نافذة الانطلاق');
  const mins=Math.round(diff/60000);
  const h=Math.floor(mins/60), mm=mins%60;
  if(h>=24) return tl(`in ${Math.round(h/24)}d`,`بعد ${Math.round(h/24)} يوم`);
  if(h>0) return tl(`in ${h}h ${mm}m`,`بعد ${h}س ${mm}د`);
  return tl(`in ${mm}m`,`بعد ${mm}د`);
}

function playerRankInfo(name){

  return {row,ahead,behind,rows};

function playerPickForMatch(playerName,m){
  const p=getPlayer(playerName);
  if(!p||!m||m.group==null||m.idx==null) return null;
  const pred=(p.groups||{})[m.group];
  if(!Array.isArray(pred)) return null;
  const [home,away]=matchTeams(m.group,m.idx);
  if(!home||!away) return null;
  const hp=pred.findIndex(x=>sameTeam(x,home));
  const ap=pred.findIndex(x=>sameTeam(x,away));
  let edge=tl('No clear edge','لا توجد أفضلية واضحة');
  if(hp>=0&&ap>=0){
    if(hp<ap) edge=teamText(home);
    else if(ap<hp) edge=teamText(away);
  }else if(hp>=0) edge=teamText(home);
  else if(ap>=0) edge=teamText(away);
  return {home,away,edge,hp,ap};
}
function availablePointsForMatch(m){
  if(!m||m.group==null||m.idx==null) return 0;
  const [home,away]=matchTeams(m.group,m.idx);
  if(!home||!away) return 0;
  return 6; // 3 points per correctly ordered team edge in this pick'em scoring model.
}

function matchReadableParts(m,status){

  return {date,time,windowText,status:(status&&status.label)||'',statusKey:key};
}

function numericScoreValue(v){
  if(v==null||v==='') return null;
  if(typeof v==='string'){
    const s=v.trim();
    if(!s || ['null','undefined','-'].includes(s.toLowerCase())) return null;
    const n=Number(s);
    return Number.isFinite(n)?n:null;
  }
  const n=Number(v);
  return Number.isFinite(n)?n:null;
}
function apiScoreFromMatch(m){
  if(!m) return null;
  const pairs=[
    ['hs','as'],['homeScore','awayScore'],['intHomeScore','intAwayScore'],['scoreHome','scoreAway'],
    ['home_score','away_score'],['homeGoals','awayGoals'],['goalsHome','goalsAway'],
    ['home_goals','away_goals'],['homeTeamScore','awayTeamScore']
  ];
  for(const [hKey,aKey] of pairs){
    const h=numericScoreValue(m[hKey]), a=numericScoreValue(m[aKey]);
    if(h!==null&&a!==null) return {hs:h,as:a};
  }
  const raw=m.score||m.result||m.ftScore||m.finalScore||m.strScore;
  if(typeof raw==='string'){
    const mm=raw.match(/(\d+)\s*[-:–]\s*(\d+)/);
    if(mm) return {hs:Number(mm[1]),as:Number(mm[2])};
  }
  return null;
}
function sameMatchTeams(a,b){
  if(!a||!b) return false;
  return sameTeam(a.home,b.home)&&sameTeam(a.away,b.away);
}
function scoreFromAnySource(m){
  if(!m) return null;
  const r=m.group&&m.idx!=null?matchResult(m.group,m.idx):null;
  if(r&&r.complete) return {hs:r.hs,as:r.as,source:'saved'};
  const own=apiScoreFromMatch(m);
  if(own) return {...own,source:'row'};
  const candidates=[...(Array.isArray(APP._homeApiResults)?APP._homeApiResults:[]),...(Array.isArray(APP._homeApiSchedule)?normalizeScheduleRowsForGst(APP._homeApiSchedule):[])];
  const found=candidates.find(x=>{
    if(!sameMatchTeams(m,x)) return false;
    const sx=apiScoreFromMatch(x);
    if(!sx) return false;
    const d1=(m.date||m.uaeDate||''), d2=(x.date||x.uaeDate||'');
    return !d1||!d2||d1===d2;
  });
  if(found){
    const sx=apiScoreFromMatch(found);
    if(sx) return {...sx,source:'api-match'};
  }
  return null;
}

function matchScoreLine(m){

function mdhMatchStatus(m){
  if(!m) return {key:'upcoming',label:tl('Upcoming','قادمة')};

  const r=m.group!=null&&m.idx!=null?matchResult(m.group,m.idx):null;
  const status=String(m.status||'').toLowerCase();
  const hasApiScore=m.hs!==undefined&&m.as!==undefined&&m.hs!==null&&m.as!==null&&m.hs!==''&&m.as!=='';

  if((r&&r.complete) || (hasApiScore && /(final|ft|finished|match finished)/i.test(status))){
    return {key:'final',label:tl('Final','نهائية')};
  }

  const ts=matchUaeTimestamp(m);
  const now=uaeNowMs();

  if(ts&&now>=ts&&now<=ts+130*60*1000) return {key:'live',label:tl('Live','مباشرة')};
  if(ts&&ts>now&&ts-now<=2*60*60*1000) return {key:'soon',label:tl('Starts soon','تبدأ قريباً')};

  return {key:'upcoming',label:tl('Upcoming','قادمة')};
}
function mdhCountdown(m){
  const ts=matchUaeTimestamp(m);
  if(!ts) return '';
  const diff=ts-uaeNowMs();
  if(diff<=-130*60*1000) return tl('Past window','خارج النافذة');
  if(diff<=0) return tl('Kickoff window','نافذة الانطلاق');
  const mins=Math.round(diff/60000);
  const h=Math.floor(mins/60), mm=mins%60;
  if(h>=24) return tl(`in ${Math.round(h/24)}d`,`بعد ${Math.round(h/24)} يوم`);
  if(h>0) return tl(`in ${h}h ${mm}m`,`بعد ${h}س ${mm}د`);
  return tl(`in ${mm}m`,`بعد ${mm}د`);
}

function mdhApiTimeLabel(m){
  if(!m) return '—';

  if(m.sourceTimestamp){
    return `${m.sourceTimestamp} (${m.sourceTimeZone||'provider timestamp'})`;
  }

  const source=(m.sourceLabel||'').trim();
  if(source){
    return `${source}${m.sourceTimeZone?` (${m.sourceTimeZone})`:''}`;
  }

  const date=m.sourceDate||m.rawDate||m.apiDate||m.dateEvent||'';
  const time=m.sourceTime||m.rawTime||m.apiTime||'';
  const zone=m.sourceTimeZone||m.timeZone||m.tzSource||'Data';
  if(date||time) return `${date}${time?' '+time:''} ${zone?`(${zone})`:''}`.trim();

  if(m.kickoffUtc) return `${m.kickoffUtc} (UTC instant)`;

  // Local/static fallback schedule has no provider source time.
  if(m.source==='local'||!m.api) return tl('Local schedule time','وقت الجدول المحلي');

  return tl('Not provided by Data','غير متوفر من Data');
}
function mdhUaeTimeLabel(m){
  if(!m) return '—';

  if(m.uaeDate||m.uaeTime||m.date||m.time){
    const date=m.uaeDate||m.date||'';
    const time=m.uaeTime||m.time||'';
    if(date||time) return `${date}${time?' · '+time:''} UAE`;
  }

  if(m.kickoffUtc){
    const d=new Date(m.kickoffUtc);
    if(Number.isFinite(d.getTime())){
      const dateParts=new Intl.DateTimeFormat('en-CA',{
        timeZone:'Asia/Dubai',
        year:'numeric',
        month:'2-digit',
        day:'2-digit'
      }).formatToParts(d);
      const get=t=>dateParts.find(p=>p.type===t)?.value||'';
      const date=`${get('year')}-${get('month')}-${get('day')}`;
      const time=new Intl.DateTimeFormat('en-US',{
        timeZone:'Asia/Dubai',
        hour:'numeric',
        minute:'2-digit',
        hour12:true
      }).format(d);
      return `${date} · ${time} UAE`;
    }
  }

  return tl('UAE conversion unavailable','تحويل الإمارات غير متوفر');
}

      if(r.complete){
        const sched=allSchedule().find(m=>m&&m.group===g&&Number(m.idx)===i)||{};
        out.push({

          home:r.home,
          away:r.away,

          as:r.as,

          date:sched.date,
          time:sched.time,

function playerGroupScoreBreakdown(calc){
  const by={};
  GROUP_KEYS.forEach(g=>by[g]={group:g,match:0,rank:0,total:0,complete:groupComplete(g)});
  (calc.detail.matches||[]).forEach(x=>{ if(by[x.group]){ by[x.group].match+=x.got; by[x.group].total+=x.got; }});
  (calc.detail.ranking||[]).forEach(x=>{ if(by[x.group]){ by[x.group].rank+=x.got; by[x.group].total+=x.got; }});
  return Object.values(by).sort((a,b)=>b.total-a.total||a.group.localeCompare(b.group));
}
function playerDataQualitySummary(name,p){
  const issues=[];
  GROUP_KEYS.forEach(g=>validateGroupPrediction(g,rawGroupPredictionValue(p,g)).forEach(x=>issues.push({group:g,...x})));
  return issues;
}
function rawGroupPredictionValue(p,g){
  return (p&&p.groupPreds&&p.groupPreds[g]) ??
    (p&&p.groups&&p.groups[g]) ??
    (p&&p.predictions&&p.predictions[g]) ??
    (p&&p.groupPredictions&&p.groupPredictions[g]) ??
    (p?p[g]:null);
}
function playerRoadToWin(name,p){
  const lb=buildLeaderboard();
  const me=lb.find(x=>x.name===name);
  const leader=lb[0];
  const gap=(leader&&me&&leader.name!==name)?Math.max(0,leader.total-me.total):0;
  const matches=upcomingGroupMatches(24);
  const opportunities=[];
  matches.forEach(m=>{
    const e=predictedEdge(p,m.group,m.home,m.away);
    if(e.status!=='ok') return;
    let hs=2,as=1,winner=m.home;
    if(sameTeam(e.edge,m.away)){ hs=1; as=2; winner=m.away; }
    const sim=simulateLeaderboardForMatch(m,hs,as);
    const row=sim.find(x=>x.name===name);
    if(row && (row.deltaPts>0 || row.deltaRank>0)){
      opportunities.push({match:m,hs,as,winner,deltaPts:row.deltaPts,deltaRank:row.deltaRank,newRank:row.rank,newTotal:row.total});
    }
  });
  opportunities.sort((a,b)=>b.deltaRank-a.deltaRank || b.deltaPts-a.deltaPts);
  return {me,leader,gap,opportunities};
}

function koSeed(){ // fill R32 from standings when all groups complete
  if(!GROUP_KEYS.every(groupComplete)) return null;
  const winners={},runners={},thirds=[];
  GROUP_KEYS.forEach(g=>{ const tb=computeGroupTable(g); winners[g]=tb[0]?.team; runners[g]=tb[1]?.team;
    if(tb[2]) thirds.push({group:g,team:tb[2].team,pts:tb[2].Pts,gd:tb[2].GD,gf:tb[2].GF}); });
  thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const best8=thirds.slice(0,8).map(x=>x.team);
  // placeholder pairing: admin can override via knockoutMatches
  const seeds=[...Object.values(winners),...Object.values(runners),...best8];
  const pairs=[]; for(let i=0;i<seeds.length;i+=2) pairs.push([seeds[i],seeds[i+1]]);
  return pairs.slice(0,16);
}

/* ================= PREDICTION AUDIT (admin) ================= */
function rawGroupPred(playerData,group){
  if(!playerData) return null;
  const paths=['groupPreds','groups','predictions','groupPredictions'];
  for(const k of paths){
    if(playerData[k] && playerData[k][group]!=null) return {path:k+'.'+group,value:playerData[k][group]};
  }
  if(playerData[group]!=null) return {path:group,value:playerData[group]};
  return {path:'missing',value:null};
}
function auditReasonText(reason){
  const map={
    edge_correct:'Correct predicted edge +'+SCORING.edgeCorrect,
    edge_wrong:'Wrong predicted edge +0',
    draw_no_edge:'Actual draw, no edge point',
    missing_team:'Team missing from prediction',
    no_pred:'No readable prediction',
    equal_rank:'Equal rank / invalid prediction',
    exact:'Exact position +'+SCORING.exactPosition,
    in_group:'Team in group, wrong position +'+SCORING.teamInGroupWrongPos,
    miss:'No ranking points',
    pending:'Result pending'
  };
  return map[reason]||String(reason||'—');
}
function auditEdgeText(edge){
  if(!edge) return '—';
  if(edge.status==='ok') return `${canonTeam(edge.edge)} (#${edge.rh} vs #${edge.ra})`.replace('undefined','');
  if(edge.status==='missing') return `${t('missingTeam')}: ${canonTeam(edge.missing||'')}`;
  if(edge.status==='none') return t('noPred');
  if(edge.status==='tie') return 'Equal rank';
  return edge.status;
}
function auditPredictionLine(arr){
  if(!arr||!arr.length) return `<span class="tag pend">${esc(t('noPred'))}</span>`;
  return [1,2,3,4].map(i=>`<span class="chip"><span class="pos">${i}</span>${esc(canonTeam(arr[i-1]||'—'))}</span>`).join(' ');
}
function auditPlayerGroupDetail(name,group){
  const p=getPlayer(name); const raw=rawGroupPred(p,group); const pred=playerGroupPred(p,group);
  const issues=validateGroupPrediction(group,raw?raw.value:null);
  const table=computeGroupTable(group); const complete=groupComplete(group);
  const matches=RR.map((_,i)=>{
    const r=matchResult(group,i); const e=predictedEdge(p,group,r.home,r.away);
    let got=0,reason='pending';
    if(r.complete){
      if(r.outcome==='draw') reason='draw_no_edge';
      else if(e.status==='ok'){
        if(sameTeam(e.edge,r.winner)){ got=SCORING.edgeCorrect; reason='edge_correct'; }
        else reason='edge_wrong';
      }else if(e.status==='missing') reason='missing_team';
      else if(e.status==='none') reason='no_pred';
      else reason='equal_rank';
    }
    return {r,e,got,reason,idx:i};
  });
  const ranking=[0,1,2,3].map(pos=>{
    const actual=table[pos]?table[pos].team:null; const picked=pred[pos]||null;
    let got=0,reason=complete?'miss':'pending';
    if(complete&&picked&&actual&&sameTeam(picked,actual)){got=SCORING.exactPosition;reason='exact';}
    else if(complete&&picked&&table.some(row=>sameTeam(row.team,picked))){got=SCORING.teamInGroupWrongPos;reason='in_group';}
    return {pos:pos+1,picked,actual,got,reason};
  });
  const issueHtml=issues.length?`<div class="banner warn">⚠ ${issues.map(x=>esc(t(x.type)||x.type)).join(' · ')} ${issues.some(x=>x.type==='missingPicks')?`<button class="btn ghost sm" onclick="openRepairPreview(${JSON.stringify(name)},'${group}')">${esc(t('preview'))}</button>`:''}</div>`:`<div class="banner ok">✅ Valid prediction shape</div>`;
  return `<details class="acc"><summary>Group ${group} <span class="sub">${pred.length}/4 · ${matches.reduce((s,m)=>s+m.got,0)} match pts · ${ranking.reduce((s,r)=>s+r.got,0)} rank pts</span></summary><div class="body">
    <div class="match"><div class="head"><span>Raw DB path: ${esc(raw.path)}</span><span class="tag pend">raw</span></div>
      <div class="sub" style="word-break:break-word">${esc(JSON.stringify(raw.value))}</div>
      <div style="margin-top:8px"><b>Normalized:</b><br>${auditPredictionLine(pred)}</div>
      ${issueHtml}</div>
    <div class="match"><div class="head"><span>Actual group table</span><span class="tag ${complete?'paid':'pend'}">${complete?'complete':esc(t('pending'))}</span></div>
      ${table.map((row,i)=>`<div class="between" style="padding:4px 0;border-bottom:1px solid var(--soft)"><span><span class="pos">${i+1}</span> ${esc(row.team)}</span><b class="num">${row.Pts} pts · ${row.GD>0?'+':''}${row.GD}</b></div>`).join('')}</div>
    <div class="match"><div class="head"><span>Match scoring</span><span class="tag adm">same logic as leaderboard</span></div>
      ${matches.map(m=>`<div class="audit-line" style="padding:8px 0;border-bottom:1px solid var(--soft)">
        <div class="between"><b>${esc(matchKey(group,m.idx))}: ${esc(m.r.home)} ${m.r.complete?m.r.hs+'-'+m.r.as:'vs'} ${esc(m.r.away)}</b><span>${m.got?'<span class="tag paid">+'+m.got+'</span>':'<span class="tag pend">+0</span>'}</span></div>
        <div class="sub">${esc(t('predictedEdge'))}: ${esc(auditEdgeText(m.e))}</div>
        <div class="sub">Reason: ${esc(auditReasonText(m.reason))}</div>
      </div>`).join('')}</div>
    <div class="match"><div class="head"><span>Ranking scoring 1–4</span><span class="tag ${complete?'paid':'pend'}">${complete?'complete':esc(t('pending'))}</span></div>
      ${ranking.map(r=>`<div class="between" style="padding:7px 0;border-bottom:1px solid var(--soft)">
        <span><span class="pos">${r.pos}</span> ${esc(r.picked||'—')} → actual ${esc(r.actual||'—')}</span>
        <span>${r.got?'<span class="tag paid">+'+r.got+'</span>':'<span class="tag pend">+0</span>'} <span class="sub">${esc(auditReasonText(r.reason))}</span></span>
      </div>`).join('')}</div>
  </div></details>`;
}

function resultPreviewHtml(g,i,h,a){
  if(h===''||a===''||h==null||a==null) return `<span class="sub">${esc(tl('Enter score to preview point impact.','أدخل النتيجة لمعاينة تأثير النقاط.'))}</span>`;
  if(!/^\d+$/.test(String(h))||!/^\d+$/.test(String(a))) return `<span class="sub">⚠ ${esc(tl('Score must be numbers.','النتيجة يجب أن تكون أرقاماً.'))}</span>`;
  const [home,away]=matchTeams(g,i);
  let winner=null; if(Number(h)>Number(a)) winner=home; else if(Number(a)>Number(h)) winner=away;
  const gainers=[];
  playerNames().forEach(name=>{
    const e=predictedEdge(getPlayer(name),g,home,away);
    if(winner&&e.status==='ok'&&sameTeam(e.edge,winner)) gainers.push(name);
  });
  const outcome=winner?teamHtml(winner):esc(t('draw'));
  return `<div><b>${esc(t('winner'))}:</b> ${outcome} · <b>${esc(t('gotRight'))}:</b> ${gainers.length}</div>
    <div style="margin-top:5px">${gainers.slice(0,12).map(n=>`<span class="gain">+${SCORING.edgeCorrect} ${esc(n)}</span>`).join('')||`<span class="sub">${esc(t('none'))}</span>`}${gainers.length>12?`<span class="sub"> +${gainers.length-12}</span>`:''}</div>`;
}
function leaderboardSnapshot(){
  return buildLeaderboard().map(r=>({name:r.name,rank:r.rank,total:r.total}));
}
function diffLeaderboard(before,after){
  return after.map(a=>{
    const b=before.find(x=>x.name===a.name)||{rank:a.rank,total:a.total};
    return {...a, oldRank:b.rank, oldTotal:b.total, deltaPts:a.total-b.total, deltaRank:b.rank-a.rank};
  });
}
async function saveOneResult(g,i){
  APP.data.groupResults=APP.data.groupResults||{}; APP.data.resultMeta=APP.data.resultMeta||{};
  const h=$('sc_'+g+'_'+i+'_h').value.trim(), a=$('sc_'+g+'_'+i+'_a').value.trim(), key=matchKey(g,i);
  if(!/^\d+$/.test(h)||!/^\d+$/.test(a)){ toast(tl('Invalid score','نتيجة غير صحيحة')); return; }
  const beforeData=JSON.parse(JSON.stringify(APP.data.groupResults||{}));
  const beforeMeta=JSON.parse(JSON.stringify(APP.data.resultMeta||{}));
  const beforeLb=leaderboardSnapshot();
  const beforeLeader=beforeLb[0]&&beforeLb[0].name;
  snapshotRanks();
  const before=APP.data.groupResults[key];
  const source=($('src_'+g+'_'+i)?.value)||(before?'corrected':'admin');
  APP.data.groupResults[key]={home:h,away:a};
  APP.data.resultMeta[key]=source;
  APP._lastResultUndo={group:g,idx:i,key,beforeData,beforeMeta};
  logAction('result_edit','groupResults.'+key,before,{home:h,away:a});
  await upsertNormalizedResult(normalizedResultRow(g,i,h,a,source,'final'));
  await saveState();
  invalidateLeaderboardCache();
  const after=leaderboardSnapshot();
  showResultCelebration(g,i,beforeLb,after,beforeLeader);
  trackEvent('admin_result_save',{match_key:key,source});
  toast(t('saved'));
  render();
}
async function clearOneResult(g,i){
  const key=matchKey(g,i), before=APP.data.groupResults&&APP.data.groupResults[key];
  if(!before){ toast(t('noData')); return; }
  APP._lastResultUndo={group:g,idx:i,key,beforeData:JSON.parse(JSON.stringify(APP.data.groupResults||{})),beforeMeta:JSON.parse(JSON.stringify(APP.data.resultMeta||{}))};
  delete APP.data.groupResults[key]; if(APP.data.resultMeta) APP.data.resultMeta[key]='pending';
  logAction('result_clear','groupResults.'+key,before,null);
  await upsertNormalizedResult(normalizedResultRow(g,i,null,null,'corrected','scheduled'));
  await saveState(); trackEvent('admin_result_clear',{match_key:key}); toast(t('saved')); render();
}
async function undoLastResult(){
  if(!APP._lastResultUndo){ toast(t('noData')); return; }
  const undo=APP._lastResultUndo;
  APP.data.groupResults=undo.beforeData||{};
  APP.data.resultMeta=undo.beforeMeta||{};
  const prev=APP.data.groupResults[undo.key];
  if(prev&&prev.home!=null&&prev.away!=null) await upsertNormalizedResult(normalizedResultRow(undo.group,undo.idx,prev.home,prev.away,APP.data.resultMeta[undo.key]||'corrected','final'));
  else await upsertNormalizedResult(normalizedResultRow(undo.group,undo.idx,null,null,'corrected','scheduled'));
  logAction('result_undo','groupResults.'+undo.key,null,'restored');
  APP._lastResultUndo=null;
  await saveState(); trackEvent('admin_result_undo',{match_key:undo.key}); toast(tl('Undo complete','تم التراجع')); render();
}
function showResultCelebration(g,i,beforeLb,afterLb,beforeLeader){
  const r=matchResult(g,i), changed=diffLeaderboard(beforeLb,afterLb);
  const gainers=changed.filter(x=>x.deltaPts>0).sort((a,b)=>b.deltaPts-a.deltaPts).slice(0,8);
  const movers=changed.filter(x=>x.deltaRank!==0).sort((a,b)=>b.deltaRank-a.deltaRank).slice(0,6);
  const newLeader=afterLb[0]&&afterLb[0].name;
  const leaderChanged=beforeLeader&&newLeader&&beforeLeader!==newLeader;
  const msg=buildResultShare(g,i,changed);
  openSheet(`<div class="card celebration">
    <h3>${leaderChanged?'🎉 '+esc(tl('New leader!','متصدر جديد!')):'✅ '+esc(tl('Result saved','تم حفظ النتيجة'))}</h3>
    <div class="teams" style="margin:12px 0"><span>${teamHtml(r.home)}</span><span class="sc num">${r.hs}-${r.as}</span><span>${teamHtml(r.away)}</span></div>
    <div class="sub">${esc(tl('Top gainers and leaderboard impact','أعلى الكاسبين وتأثير الترتيب'))}</div>
    ${gainers.length?gainers.map(x=>`<div class="lb-row"><span class="rank">+${x.deltaPts}</span><span class="nm">${playerNameHtml(x.name,'sm')}</span><span class="pts">${x.total}</span></div>`).join(''):`<div class="sub">${esc(t('none'))}</div>`}
    ${movers.length?`<h3 style="margin-top:12px">🚀 ${esc(tl('Rank movers','تغيّر المراكز'))}</h3>`+movers.map(x=>`<div class="lb-row"><span class="rank">${x.deltaRank>0?'▲'+x.deltaRank:'▼'+Math.abs(x.deltaRank)}</span><span class="nm">${playerNameHtml(x.name,'sm')}</span><span class="pts">#${x.rank}</span></div>`).join(''):''}
    <button class="btn gold" style="margin-top:12px" onclick='copyText(${JSON.stringify(msg)})'>${esc(t('share'))}</button>
    <button class="btn ghost" style="margin-top:8px" onclick="closeSheet()">${esc(t('close'))}</button>
  </div>`);
}
function buildResultShare(g,i,changed){
  const r=matchResult(g,i);
  const top=buildLeaderboard().slice(0,5).map(x=>`#${x.rank} ${x.name} — ${x.total}`).join('\n');
  const gainers=changed.filter(x=>x.deltaPts>0).sort((a,b)=>b.deltaPts-a.deltaPts).slice(0,5).map(x=>`${x.name} +${x.deltaPts}`).join(', ')||t('none');
  return `⚽ ${teamText(r.home)} ${r.hs}-${r.as} ${teamText(r.away)}\n🔥 ${tl('Top gainers','أعلى الكاسبين')}: ${gainers}\n\n🏆 ${tl('Leaderboard','الترتيب')}\n${top}`;
}
