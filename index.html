/* ---- routed Q&A ---- */

function scenarioMatchesPool(){
  const sched=(Array.isArray(APP.data.scheduleMatches)&&APP.data.scheduleMatches.length)?APP.data.scheduleMatches:buildLocalSchedule();
  return sched.filter(m=>m.group&&m.idx!=null&&!matchResult(m.group,m.idx).complete);
}
function mentionedTeamInText(team,qNorm){ const k=teamCompareKey(team); return k && qNorm.includes(k); }
function parseScenarioCommand(q){
  const raw=String(q||'').trim();
  const qn=norm(raw);
  const matches=scenarioMatchesPool();
  let best=null, bestScore=0;
  matches.forEach(m=>{
    const score=(mentionedTeamInText(m.home,qn)?1:0)+(mentionedTeamInText(m.away,qn)?1:0);
    if(score>bestScore){best=m;bestScore=score;}
  });
  if(!best && matches.length) best=matches[0];
  if(!best) return null;
  let hs=null, as=null;
  const scoreMatch=raw.match(/(\d{1,2})\s*[-:]\s*(\d{1,2})/);
  if(scoreMatch){ hs=Number(scoreMatch[1]); as=Number(scoreMatch[2]); }
  else{
    const drawWords=['draw','tie','تعادل'];
    const isDraw=drawWords.some(w=>qn.includes(norm(w)));
    if(isDraw){ hs=1; as=1; }
    else{
      let homeMention=mentionedTeamInText(best.home,qn), awayMention=mentionedTeamInText(best.away,qn);
      const winWords=['win','wins','beat','beats','defeat','defeats','فوز','يفوز','تفوز','يهزم','تهزم'];
      const asksWin=winWords.some(w=>qn.includes(norm(w)));
      if(asksWin && awayMention && !homeMention){ hs=1; as=2; }
      else { hs=2; as=1; }
    }
  }
  return {match:best,hs,as,raw};
}
function simulateLeaderboardForMatch(m,hs,as){
  invalidateLeaderboardCache();
  const before=buildLeaderboard();
  const old=APP.data.groupResults||{};
  const oldMeta=APP.data.resultMeta||{};
  try{
    const sim=JSON.parse(JSON.stringify(old));
    sim[matchKey(m.group,m.idx)]={home:String(hs),away:String(as)};
    APP.data.groupResults=sim;
    invalidateLeaderboardCache();
    const after=buildLeaderboard();
    return after.map(r=>{
      const b=before.find(x=>x.name===r.name)||{rank:r.rank,total:r.total};
      return {...r, oldRank:b.rank, oldTotal:b.total, deltaPts:r.total-b.total, deltaRank:b.rank-r.rank};
    });
  }finally{
    APP.data.groupResults=old;
    APP.data.resultMeta=oldMeta;
    invalidateLeaderboardCache();
  }
}

function sportsScore(e){
  const hs=e&&(e.intHomeScore!==null&&e.intHomeScore!==undefined)?String(e.intHomeScore):'';
  const as=e&&(e.intAwayScore!==null&&e.intAwayScore!==undefined)?String(e.intAwayScore):'';
  if(hs!==''&&as!=='') return {home:hs,away:as};
  return null;
}
function sportsEventComplete(e){
  const sc=sportsScore(e);
  if(!sc) return false;
  const st=String((e&&e.strStatus)||'').toLowerCase();
  if(!st) return true;
  return st.includes('match finished') || st==='ft' || st==='aet' || st.includes('full') || st.includes('finished') || st.includes('after') || st.includes('complete');
}
function mapEventToGroupMatch(e){
  const eh=e&&e.strHomeTeam, ea=e&&e.strAwayTeam;
  if(!eh||!ea) return null;
  const bySchedule=findScheduledMatchByTeams(eh,ea);
  if(bySchedule) return bySchedule;
  for(const g of GROUP_KEYS){
    for(let i=0;i<RR.length;i++){
      const [h,a]=matchTeams(g,i);
      if((sameTeam(eh,h)&&sameTeam(ea,a))||(sameTeam(eh,a)&&sameTeam(ea,h))){
        const reversed=sameTeam(eh,a)&&sameTeam(ea,h);
        return {group:g,idx:i,key:matchKey(g,i),home:h,away:a,reversed};
      }
    }
  }
  return null;
}
function compareApiEventToApp(e){
  const m=mapEventToGroupMatch(e);
  const sc=sportsScore(e);
  if(!m||!sc) return {status:'unmapped',event:e,match:m,api:sc,app:null};
  const api=m.reversed?{home:sc.away,away:sc.home}:sc;
  const app=readScore((APP.data.groupResults||{})[m.key]);
  let status='missing';
  if(app) status=(String(app.hs)===String(api.home)&&String(app.as)===String(api.away))?'match':'mismatch';
  return {status,event:e,match:m,api,app};
}
async function fetchCompletedApiComparisons(){
  APP._syncError=null;
  APP._syncDebug={days:0,events:0,completed:0,mapped:0};
  try{ await ensureApiScheduleIndexed(true); }catch(e){ console.warn('Could not refresh schedule before sync',e); APP._syncError=String(e&&e.message?e.message:e); }
  const end=uaeToday()>WC_END?WC_END:uaeToday();
  const dates=dateRange(WC_START,end);
  const rows=[];
  for(const d of dates){
    APP._syncDebug.days++;
    const ev=await fetchDay(d);
    APP._syncDebug.events+=ev.length;
    ev.filter(sportsEventComplete).forEach(e=>{
      APP._syncDebug.completed++;
      const row=compareApiEventToApp(e);
      if(row.match) APP._syncDebug.mapped++;
      rows.push(row);
    });
  }
  return rows;
}

  return alerts;
}

function runScenarioLab(){

  const gainers=rows.filter(x=>x.deltaPts>0).sort((a,b)=>b.deltaPts-a.deltaPts).slice(0,10);

const Data_GROUP_BY_TEAM=(()=>{
  const map={};
  for(const g of GROUP_KEYS){
    for(const tm of (GROUPS[g]||[])){
      if(!tm||tm==='TBD') continue;
      map[teamCompareKey(tm)]=g;
      map[norm(tm)]=g;
      const variants=TEAM_ALIASES[canonTeam(tm)]||[];
      variants.forEach(v=>{ map[norm(v)]=g; });
    }
  }
  return map;
})();

  if(Data_GROUP_BY_TEAM[k]) return Data_GROUP_BY_TEAM[k];
  const raw=norm(team);
  if(Data_GROUP_BY_TEAM[raw]) return Data_GROUP_BY_TEAM[raw];
  for(const g of GROUP_KEYS) if((GROUPS[g]||[]).some(tm=>sameTeam(tm,team))) return g;
  return '';
}
function groupFromEvent(e){
  const gh=groupForTeamFromApiName(e&&e.strHomeTeam);
  const ga=groupForTeamFromApiName(e&&e.strAwayTeam);
  if(gh&&ga&&gh===ga) return gh;
  return gh||ga||'TBD';
}
function scheduleRowsFromApiEvents(ev){
  const counters={};
  const rows=[];
  (ev||[]).forEach((e,rawIndex)=>{
    if(!e||!e.strHomeTeam||!e.strAwayTeam) return;
    const g=groupFromEvent(e)||'TBD';
    counters[g]=counters[g]||0;
    const idx=counters[g]++;
    const meta=apiEventKickoffMeta(e);
    rows.push({
      group:g,
      idx,
      key:matchKey(g,idx),
      home:canonTeam(e.strHomeTeam),
      away:canonTeam(e.strAwayTeam),
      date:meta.uaeDate,
      time:meta.uaeTime,
      uaeDate:meta.uaeDate,
      uaeTime:meta.uaeTime,
      kickoffUtc:meta.kickoffUtc,
      sourceDate:meta.sourceDate,
      sourceTime:meta.sourceTime,
      sourceTimeZone:meta.sourceTimeZone,
      sourceTimestamp:meta.sourceTimestamp,
      sourceLocalDate:meta.sourceLocalDate,
      sourceLocalTime:meta.sourceLocalTime,
      sourceLabel:meta.sourceLabel,
      tz:'UAE',
      source:'live',
      eventId:e.idEvent||e.idSoccerXML||null,
      status:e.strStatus||'Scheduled',
      venue:e.strVenue||'',
      api:true,
      rawIndex
    });
  });
  return normalizeScheduleRowsForGst(rows).sort((a,b)=>matchUaeTimestamp(a)-matchUaeTimestamp(b));

async function ensureApiScheduleIndexed(persist){
  if(APP._apiScheduleIndexed&&Array.isArray(APP.data.scheduleMatches)&&APP.data.scheduleMatches.some(m=>m.source==='api'&&m.idx!=null)) return APP.data.scheduleMatches;
  const ev=await fetchFullSchedule();

  const rows=scheduleRowsFromApiEvents(ev);
  if(rows.length){
    APP.data.scheduleMatches=rows;
    APP._schedule=rows;
    APP._apiScheduleIndexed=true;
    if(persist) await saveState();
  }
  return rows;
}
function findScheduledMatchByTeams(home,away){
  const sched=(Array.isArray(APP.data.scheduleMatches)&&APP.data.scheduleMatches.length)?APP.data.scheduleMatches:(APP._schedule||[]);
  const eh=teamCompareKey(home), ea=teamCompareKey(away);
  for(const m of sched){
    if(!m||!m.home||!m.away||m.group==null||m.idx==null) continue;
    const mh=teamCompareKey(m.home), ma=teamCompareKey(m.away);
    if((eh===mh&&ea===ma)||(eh===ma&&ea===mh)){
      return {group:m.group,idx:Number(m.idx),key:m.key||matchKey(m.group,m.idx),home:canonTeam(m.home),away:canonTeam(m.away),reversed:(eh===ma&&ea===mh)};
    }
  }
  return null;
}

/* ================= v72 canonical source/user time layer =================
   Applied to newest active code version.
   Product rules:
   - Match cards and Home hero show original source time only.
   - Today popup shows original source time + browser-local time.
   - Countdown/sorting use a real absolute instant.
   - Admin auth/logic is untouched.
*/
function toAmPmFromHHMM(hhmm){
  if(!hhmm) return '';
  const m=String(hhmm).match(/^(\d{1,2}):(\d{2})/);
  if(!m) return String(hhmm);

  let h=Number(m[1]);
  const min=m[2];
  const ampm=h>=12?'PM':'AM';

  h=h%12;
  if(h===0) h=12;

  return h+':'+min+' '+ampm;
}

function parseTimeTo24(time){
  if(!time) return null;

  const s=String(time).trim().toUpperCase();

  let m=s.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/);
  if(m){
    let h=Number(m[1]);
    const min=Number(m[2]);

    if(m[3]==='PM' && h<12) h+=12;
    if(m[3]==='AM' && h===12) h=0;

    return {h,min};
  }

  m=s.match(/^(\d{1,2}):(\d{2})/);
  if(m){
    return {h:Number(m[1]),min:Number(m[2])};
  }

  return null;
}

function browserTimeZone(){
  try{
    return Intl.DateTimeFormat().resolvedOptions().timeZone || 'Asia/Dubai';
  }catch(e){
    return 'Asia/Dubai';
  }
}

function isValidIanaTimeZone(tz){
  if(!tz || typeof tz!=='string') return false;
  try{
    new Intl.DateTimeFormat('en-US',{timeZone:tz}).format(new Date());
    return true;
  }catch(e){
    return false;
  }
}

function timeZoneShortName(tz,d){
  try{
    const safeTz=isValidIanaTimeZone(tz)?tz:'America/New_York';
    const parts=new Intl.DateTimeFormat('en-US',{
      timeZone:safeTz,
      timeZoneName:'short'
    }).formatToParts(d||new Date());

    return parts.find(p=>p.type==='timeZoneName')?.value || safeTz;
  }catch(e){
    return tz || 'America/New_York';
  }
}

function sportsDbFallbackSourceTimeZone(eOrRow){
  const candidate =
    (eOrRow&&eOrRow.sourceTimeZone) ||
    (eOrRow&&eOrRow.sourceTimezone) ||
    (eOrRow&&eOrRow.timeZone) ||
    (eOrRow&&eOrRow.timezone) ||
    '';

  return isValidIanaTimeZone(candidate) ? candidate : 'America/New_York';
}

function parseAbsoluteTimestamp(stamp){
  if(!stamp) return null;

  const s=String(stamp).trim();

  if(/[zZ]$|[+-]\d{2}:?\d{2}$/.test(s)){
    const d=new Date(s);
    return Number.isFinite(d.getTime()) ? d : null;
  }

  const m=s.match(/^(\d{4}-\d{2}-\d{2})[T\s](\d{2}:\d{2})(?::\d{2})?$/);
  if(m){
    const d=new Date(`${m[1]}T${m[2]}:00Z`);
    return Number.isFinite(d.getTime()) ? d : null;
  }

  const d=new Date(s);
  return Number.isFinite(d.getTime()) ? d : null;
}

function instantFromDateTimeInZone(date,time,tz){
  if(!date || !time || !tz) return null;

  const safeTz=isValidIanaTimeZone(tz)?tz:'America/New_York';
  const tm=parseTimeTo24(time);
  if(!tm) return null;

  let guess=Date.UTC(
    Number(date.slice(0,4)),
    Number(date.slice(5,7))-1,
    Number(date.slice(8,10)),
    tm.h,
    tm.min,
    0
  );

  for(let i=0;i<4;i++){
    const d=new Date(guess);

    const parts=new Intl.DateTimeFormat('en-CA',{
      timeZone:safeTz,
      year:'numeric',
      month:'2-digit',
      day:'2-digit',
      hour:'2-digit',
      minute:'2-digit',
      hourCycle:'h23'
    }).formatToParts(d);

    const get=t=>parts.find(p=>p.type===t)?.value || '';

    const wallDate=`${get('year')}-${get('month')}-${get('day')}`;
    const wallHour=Number(get('hour')==='24'?'0':get('hour'));
    const wallMin=Number(get('minute')||0);

    const wall=Date.UTC(
      Number(wallDate.slice(0,4)),
      Number(wallDate.slice(5,7))-1,
      Number(wallDate.slice(8,10)),
      wallHour,
      wallMin,
      0
    );

    const target=Date.UTC(
      Number(date.slice(0,4)),
      Number(date.slice(5,7))-1,
      Number(date.slice(8,10)),
      tm.h,
      tm.min,
      0
    );

    const diff=target-wall;

    if(Math.abs(diff)<60000){
      return new Date(guess);
    }

    guess+=diff;
  }

  const out=new Date(guess);
  return Number.isFinite(out.getTime()) ? out : null;
}

function sportsDbTimeInstant(eOrRow){
  if(!eOrRow) return null;

  const stamp=(eOrRow.strTimestamp || eOrRow.sourceTimestamp || '');
  if(stamp){
    const parsed=parseAbsoluteTimestamp(stamp);
    if(parsed) return parsed;
  }

  if(eOrRow.kickoffUtc){
    const parsed=parseAbsoluteTimestamp(eOrRow.kickoffUtc);
    if(parsed) return parsed;
  }

  const apiDate=
    eOrRow.dateEvent ||
    eOrRow.sourceDate ||
    eOrRow.apiDate ||
    eOrRow.rawDate ||
    '';

  const apiTime=
    eOrRow.strTime ||
    eOrRow.sourceTime ||
    eOrRow.strEventTime ||
    eOrRow.apiTime ||
    eOrRow.rawTime ||
    '';

  if(apiDate && apiTime){
    const tz=sportsDbFallbackSourceTimeZone(eOrRow);
    const zoned=instantFromDateTimeInZone(apiDate,apiTime,tz);
    if(zoned) return zoned;
  }

  return null;
}

function shortDateTimeInZone(d,tz){
  if(!d || !Number.isFinite(d.getTime())) return '—';

  const safeTz=isValidIanaTimeZone(tz)?tz:'America/New_York';

  const date=new Intl.DateTimeFormat('en-GB',{
    timeZone:safeTz,
    day:'2-digit',
    month:'short'
  }).format(d);

  const time=new Intl.DateTimeFormat('en-US',{
    timeZone:safeTz,
    hour:'numeric',
    minute:'2-digit',
    hour12:true
  }).format(d);

  return `${date}, ${time} ${timeZoneShortName(safeTz,d)}`;
}

function sourceDateTimeRawParts(eOrRow){
  if(!eOrRow) return {date:'',time:''};

  const date=
    eOrRow.dateEvent ||
    eOrRow.sourceDate ||
    eOrRow.apiDate ||
    eOrRow.rawDate ||
    '';

  const time=
    eOrRow.strTime ||
    eOrRow.sourceTime ||
    eOrRow.strEventTime ||
    eOrRow.apiTime ||
    eOrRow.rawTime ||
    '';

  return {date,time};
}

function shortSourceDateTime(eOrRow){
  if(!eOrRow) return '—';

  const p=sourceDateTimeRawParts(eOrRow);
  const sourceTz=sportsDbFallbackSourceTimeZone(eOrRow);

  if(p.date || p.time){
    let shortDate=p.date;

    const m=String(p.date).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(m){
      const fakeUtc=new Date(Date.UTC(
        Number(m[1]),
        Number(m[2])-1,
        Number(m[3]),
        12,
        0,
        0
      ));

      shortDate=new Intl.DateTimeFormat('en-GB',{
        timeZone:'UTC',
        day:'2-digit',
        month:'short'
      }).format(fakeUtc);
    }

    const instant=sportsDbTimeInstant(eOrRow);
    const sourceTzName=timeZoneShortName(sourceTz,instant || new Date());

    return `${shortDate}${p.time?', '+toAmPmFromHHMM(p.time):''} ${sourceTzName}`.trim();
  }

  const instant=sportsDbTimeInstant(eOrRow);
  if(instant){
    return shortDateTimeInZone(instant,sourceTz);
  }

  return '—';
}

function shortUserDateTime(eOrRow){
  const d=sportsDbTimeInstant(eOrRow);
  return shortDateTimeInZone(d,browserTimeZone());
}

function sportsDbSourceDisplayLabel(eOrRow){
  return shortSourceDateTime(eOrRow);
}

function sportsDbUserLocalLabel(eOrRow){

function sportsDbSourceLabel(eOrRow){

function matchDateTime(m){
  if(!m) return '';

  const apiLike=!!(
    m.api ||
    m.eventId ||
    m.source==='live' ||
    m.source==='api' ||
    m.sourceDate ||
    m.sourceTime ||
    m.sourceTimestamp ||
    m.strTimestamp ||
    m.kickoffUtc
  );

  if(apiLike){
    return sportsDbSourceDisplayLabel(m);
  }

  const date=(m&&m.uaeDate) || (m&&m.date) || '';
  const time=(m&&m.uaeTime) || (m&&m.time) || (m&&m.strTime ? toAmPmFromHHMM(m.strTime) : '');

  if(date && time){
    return date+' · '+time+(m.tz?' '+m.tz:'');
  }

  return date || time || '';
}

function matchUaeTimestamp(m){
  if(!m) return 0;

  const apiLike=!!(
    m.api ||
    m.eventId ||
    m.source==='live' ||
    m.source==='api' ||
    m.sourceDate ||
    m.sourceTime ||
    m.sourceTimestamp ||
    m.strTimestamp ||
    m.kickoffUtc
  );

  if(apiLike){
    const d=sportsDbTimeInstant(m);
    if(d) return d.getTime();
  }

  if(m.kickoffUtc){
    const d=parseAbsoluteTimestamp(m.kickoffUtc);
    if(d) return d.getTime();
  }

  if(!m.date) return 0;

  const tm=parseTimeTo24(m.time || m.strTime || '00:00');
  const h=tm ? tm.h : 0;
  const min=tm ? tm.min : 0;

  // Legacy non-Data rows were stored as UAE display rows.
  return Date.UTC(
    Number(m.date.slice(0,4)),
    Number(m.date.slice(5,7))-1,
    Number(m.date.slice(8,10)),
    h-4,
    min,
    0
  );
}

function matchKickoffTimestamp(m){
  return matchUaeTimestamp(m);
}

function countdownText(m){
  const ts=matchUaeTimestamp(m);
  if(!ts) return '';

  const diff=ts-Date.now();

  if(diff<=-130*60*1000){
    return tl('Finished / past window','انتهت / خارج النافذة');
  }

  if(diff<=0){
    return tl('Kickoff window','نافذة الانطلاق');
  }

  const mins=Math.ceil(diff/60000);
  const h=Math.floor(mins/60);
  const mm=mins%60;

  if(h>=24){
    return tl(`in ${Math.round(h/24)}d`,`بعد ${Math.round(h/24)} يوم`);
  }

  if(h>0){
    return tl(`in ${h}h ${mm}m`,`بعد ${h}س ${mm}د`);
  }

  return tl(`in ${mm}m`,`بعد ${mm}د`);
}

function dateKeyInZone(d,tz){
  if(!d || !Number.isFinite(d.getTime())) return '';

  const safeTz=isValidIanaTimeZone(tz)?tz:'Asia/Dubai';
  const parts=new Intl.DateTimeFormat('en-CA',{
    timeZone:safeTz,
    year:'numeric',
    month:'2-digit',
    day:'2-digit'
  }).formatToParts(d);

  const get=t=>parts.find(p=>p.type===t)?.value || '';

  return `${get('year')}-${get('month')}-${get('day')}`;
}

function todayInZone(tz){
  return dateKeyInZone(new Date(),tz);
}

function todayPopupShownKey(){
  const tz=browserTimeZone();
  return 'wc2026_today_popup_'+tz+'_'+todayInZone(tz);
}

function todayPopupRows(){
  const tz=browserTimeZone();
  const today=todayInZone(tz);

  return homeSchedule()
    .filter(m=>{
      if(!m || !m.group || m.idx==null) return false;

      const instant=sportsDbTimeInstant(m);
      if(instant){
        return dateKeyInZone(instant,tz)===today;
      }

      return m.date===today;
    })
    .sort((a,b)=>matchUaeTimestamp(a)-matchUaeTimestamp(b));
}

function apiEventKickoffMeta(e){
  if(!e) return {
    kickoffUtc:null,uaeDate:'',uaeTime:'',date:'',time:'',
    sourceDate:'',sourceTime:'',sourceTimeZone:'',sourceTimestamp:'',
    sourceLocalDate:'',sourceLocalTime:'',sourceLabel:''
  };

  const sourceDate=e.dateEvent||'';
  const sourceTime=e.strTime||e.strEventTime||'';
  const sourceTimestamp=e.strTimestamp||'';
  const sourceLocalDate=e.dateEventLocal||'';
  const sourceLocalTime=e.strTimeLocal||'';
  const sourceTimeZone=sportsDbFallbackSourceTimeZone(e);
  const d=sportsDbTimeInstant(e);

  return {
    kickoffUtc:d?d.toISOString():null,
    uaeDate:'',
    uaeTime:'',
    date:sourceDate,
    time:sourceTime?toAmPmFromHHMM(sourceTime):'',
    sourceDate,
    sourceTime,
    sourceTimeZone,
    sourceTimestamp,
    sourceLocalDate,
    sourceLocalTime,
    sourceLabel:sportsDbSourceLabel(e)
  };
}

function normalizeSportsDbRow(row){
  if(!row||typeof row!=='object') return row;

  const m={...row};
  const d=sportsDbTimeInstant(m);
  const source=sourceDateTimeRawParts(m);

  if(d){
    m.kickoffUtc=d.toISOString();
  }

  if(source.date) m.date=source.date;
  if(source.time) m.time=toAmPmFromHHMM(source.time);

  m.sourceDate=m.sourceDate||m.dateEvent||source.date||'';
  m.sourceTime=m.sourceTime||m.strTime||m.strEventTime||source.time||'';
  m.sourceTimeZone=sportsDbFallbackSourceTimeZone(m);
  m.sourceLabel=sportsDbSourceLabel(m);

  return m;
}

function normalizeScheduleRowsForGst(rows){
  return (Array.isArray(rows)?rows:[]).map(normalizeSportsDbRow);
}

function sportsDbFallbackSourceTimeZone(eOrRow){
  const candidate =
    (eOrRow&&eOrRow.sourceTimeZone) ||
    (eOrRow&&eOrRow.sourceTimezone) ||
    (eOrRow&&eOrRow.timeZone) ||
    (eOrRow&&eOrRow.timezone) ||
    '';

  return isValidIanaTimeZone(candidate) ? candidate : 'America/New_York';
}

function parseAbsoluteTimestamp(stamp){
  if(!stamp) return null;

  const s=String(stamp).trim();

  // Has explicit timezone: Z or ±HH:mm / ±HHmm.
  if(/[zZ]$|[+-]\d{2}:?\d{2}$/.test(s)){
    const d=new Date(s);
    return Number.isFinite(d.getTime()) ? d : null;
  }

  // Naive timestamp fallback.
  // Treat as UTC only for this feed contract.
  const m=s.match(/^(\d{4}-\d{2}-\d{2})[T\s](\d{2}:\d{2})(?::\d{2})?$/);
  if(m){
    const d=new Date(`${m[1]}T${m[2]}:00Z`);
    return Number.isFinite(d.getTime()) ? d : null;
  }

  const d=new Date(s);
  return Number.isFinite(d.getTime()) ? d : null;
}

function instantFromDateTimeInZone(date,time,tz){
  if(!date || !time || !tz) return null;

  const safeTz=isValidIanaTimeZone(tz)?tz:'America/New_York';
  const tm=parseTimeTo24(time);
  if(!tm) return null;

  let guess=Date.UTC(
    Number(date.slice(0,4)),
    Number(date.slice(5,7))-1,
    Number(date.slice(8,10)),
    tm.h,
    tm.min,
    0
  );

  for(let i=0;i<4;i++){
    const d=new Date(guess);

    const parts=new Intl.DateTimeFormat('en-CA',{
      timeZone:safeTz,
      year:'numeric',
      month:'2-digit',
      day:'2-digit',
      hour:'2-digit',
      minute:'2-digit',
      hourCycle:'h23'
    }).formatToParts(d);

    const get=t=>parts.find(p=>p.type===t)?.value || '';

    const wallDate=`${get('year')}-${get('month')}-${get('day')}`;
    const wallHour=Number(get('hour')==='24'?'0':get('hour'));
    const wallMin=Number(get('minute')||0);

    const wall=Date.UTC(
      Number(wallDate.slice(0,4)),
      Number(wallDate.slice(5,7))-1,
      Number(wallDate.slice(8,10)),
      wallHour,
      wallMin,
      0
    );

    const target=Date.UTC(
      Number(date.slice(0,4)),
      Number(date.slice(5,7))-1,
      Number(date.slice(8,10)),
      tm.h,
      tm.min,
      0
    );

    const diff=target-wall;

    if(Math.abs(diff)<60000){
      return new Date(guess);
    }

    guess+=diff;
  }

  const out=new Date(guess);
  return Number.isFinite(out.getTime()) ? out : null;
}

function sportsDbTimeInstant(eOrRow){
  if(!eOrRow) return null;

  const stamp=(eOrRow.strTimestamp || eOrRow.sourceTimestamp || '');
  if(stamp){
    const parsed=parseAbsoluteTimestamp(stamp);
    if(parsed) return parsed;
  }

  if(eOrRow.kickoffUtc){
    const parsed=parseAbsoluteTimestamp(eOrRow.kickoffUtc);
    if(parsed) return parsed;
  }

  const apiDate=
    eOrRow.dateEvent ||
    eOrRow.sourceDate ||
    eOrRow.apiDate ||
    eOrRow.rawDate ||
    '';

  const apiTime=
    eOrRow.strTime ||
    eOrRow.sourceTime ||
    eOrRow.strEventTime ||
    eOrRow.apiTime ||
    eOrRow.rawTime ||
    '';

  if(apiDate && apiTime){
    const tz=sportsDbFallbackSourceTimeZone(eOrRow);
    const zoned=instantFromDateTimeInZone(apiDate,apiTime,tz);
    if(zoned) return zoned;
  }

  return null;
}

function shortDateTimeInZone(d,tz){
  if(!d || !Number.isFinite(d.getTime())) return '—';

  const safeTz=isValidIanaTimeZone(tz)?tz:'America/New_York';
  const date=new Intl.DateTimeFormat('en-GB',{
    timeZone:safeTz,
    day:'2-digit',
    month:'short'
  }).format(d);

  const time=new Intl.DateTimeFormat('en-US',{
    timeZone:safeTz,
    hour:'numeric',
    minute:'2-digit',
    hour12:true
  }).format(d);

  return `${date}, ${time} ${timeZoneShortName(safeTz,d)}`;
}

function sourceDateTimeRawParts(eOrRow){
  if(!eOrRow) return {date:'',time:''};

  const date=
    eOrRow.dateEvent ||
    eOrRow.sourceDate ||
    eOrRow.apiDate ||
    eOrRow.rawDate ||

    eOrRow.strTime ||
    eOrRow.sourceTime ||
    eOrRow.strEventTime ||
    eOrRow.apiTime ||
    eOrRow.rawTime ||

  return {date,time};
}

function shortSourceDateTime(eOrRow){
  if(!eOrRow) return '—';

  const p=sourceDateTimeRawParts(eOrRow);
  const sourceTz=sportsDbFallbackSourceTimeZone(eOrRow);

  // Case 1: Raw source date/time exists. Display without converting wall-clock time.
  if(p.date || p.time){
    let shortDate=p.date;

    const m=String(p.date).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(m){
      const fakeUtc=new Date(Date.UTC(
        Number(m[1]),
        Number(m[2])-1,
        Number(m[3]),
        12,
        0,
        0
      ));

      shortDate=new Intl.DateTimeFormat('en-GB',{
        timeZone:'UTC',
        day:'2-digit',
        month:'short'
      }).format(fakeUtc);
    }

    const instant=sportsDbTimeInstant(eOrRow);
    const sourceTzName=timeZoneShortName(sourceTz,instant || new Date());

    return `${shortDate}${p.time?', '+toAmPmFromHHMM(p.time):''} ${sourceTzName}`.trim();
  }

  // Case 2: Only absolute instant exists. Format that instant in source timezone.
  const instant=sportsDbTimeInstant(eOrRow);
  if(instant){
    return shortDateTimeInZone(instant,sourceTz);
  }

  return '—';
}

function matchDateTime(m){
  if(!m) return '';

  const apiLike=!!(
    m.api ||
    m.eventId ||
    m.source==='live' ||
    m.source==='api' ||
    m.sourceDate ||
    m.sourceTime ||
    m.sourceTimestamp ||
    m.strTimestamp ||
    m.kickoffUtc
  );

  if(apiLike){
    return sportsDbSourceDisplayLabel(m);
  }

  const date=(m&&m.uaeDate) || (m&&m.date) || '';
  const time=(m&&m.uaeTime) || (m&&m.time) || (m&&m.strTime ? toAmPmFromHHMM(m.strTime) : '');

  if(date && time){
    return date+' · '+time+(m.tz?' '+m.tz:'');
  }

  return date || time || '';
}

function matchUaeTimestamp(m){
  // Name kept for compatibility.
  // This returns an absolute timestamp for countdown/sorting.
  if(!m) return 0;

  const apiLike=!!(
    m.api ||
    m.eventId ||
    m.source==='live' ||
    m.source==='api' ||
    m.sourceDate ||
    m.sourceTime ||
    m.sourceTimestamp ||
    m.strTimestamp ||
    m.kickoffUtc
  );

  if(apiLike){
    const d=sportsDbTimeInstant(m);
    if(d) return d.getTime();
  }

  if(m.kickoffUtc){
    const d=parseAbsoluteTimestamp(m.kickoffUtc);
    if(d) return d.getTime();
  }

  if(!m.date) return 0;

  const tm=parseTimeTo24(m.time || m.strTime || '00:00');
  const h=tm ? tm.h : 0;
  const min=tm ? tm.min : 0;

  // Legacy non-Data rows were stored as UAE display rows.
  return Date.UTC(
    Number(m.date.slice(0,4)),
    Number(m.date.slice(5,7))-1,
    Number(m.date.slice(8,10)),
    h-4,
    min,
    0
  );
}

function matchKickoffTimestamp(m){
  return matchUaeTimestamp(m);
}

function countdownText(m){
  const ts=matchUaeTimestamp(m);
  if(!ts) return '';

  const diff=ts-Date.now();

  if(diff<=-130*60*1000){
    return tl('Finished / past window','انتهت / خارج النافذة');
  }

  if(diff<=0){
    return tl('Kickoff window','نافذة الانطلاق');
  }

  const mins=Math.ceil(diff/60000);
  const h=Math.floor(mins/60);
  const mm=mins%60;

  if(h>=24){
    return tl(`in ${Math.round(h/24)}d`,`بعد ${Math.round(h/24)} يوم`);
  }

  if(h>0){
    return tl(`in ${h}h ${mm}m`,`بعد ${h}س ${mm}د`);
  }

  return tl(`in ${mm}m`,`بعد ${mm}د`);
}

function dateKeyInZone(d,tz){

  const safeTz=isValidIanaTimeZone(tz)?tz:'Asia/Dubai';

    year:'numeric',
    month:'2-digit',
    day:'2-digit'
  }).formatToParts(d);

  const get=t=>parts.find(p=>p.type===t)?.value || '';

function popupResultForMatch(m){
  if(!m) return null;

  if(m.hs!==undefined && m.as!==undefined && m.hs!==null && m.as!==null && m.hs!=='' && m.as!==''){
    return {
      hs:Number(m.hs),
      as:Number(m.as),
      status:m.status||'Final',
      api:!!m.api
    };
  }

  const apiRows=typeof apiHomeMatches==='function'?apiHomeMatches():[];
  const hit=apiRows.find(x=>{
    if(!x) return false;
    if(m.eventId && x.eventId && String(m.eventId)===String(x.eventId)) return true;
    if(m.group && x.group && String(m.group)===String(x.group) && m.idx!=null && x.idx!=null && Number(m.idx)===Number(x.idx)) return true;
    return sameTeam(m.home,x.home)&&sameTeam(m.away,x.away);
  });

  if(hit && hit.hs!==undefined && hit.as!==undefined && hit.hs!==null && hit.as!==null){
    return {
      hs:Number(hit.hs),
      as:Number(hit.as),
      status:hit.status||'Final',
      api:!!hit.api
    };
  }

  if(m.group && m.idx!=null){
    const r=matchResult(m.group,m.idx);
    if(r&&r.complete){
      return {
        hs:Number(r.hs),
        as:Number(r.as),
        status:'Final',
        api:false
      };
    }
  }

  return null;
}

function toAmPmFromHHMM(hhmm){
  if(!hhmm) return '';
  const m=String(hhmm).match(/^(\d{1,2}):(\d{2})/);
  if(!m) return String(hhmm);
  let h=Number(m[1]);
  const min=m[2];
  const ampm=h>=12?'PM':'AM';
  h=h%12;
  if(h===0) h=12;
  return h+':'+min+' '+ampm;
}
function parseTimeTo24(time){
  if(!time) return null;
  const s=String(time).trim().toUpperCase();
  let m=s.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/);
  if(m){
    let h=Number(m[1]);
    const min=Number(m[2]);
    if(m[3]==='PM' && h<12) h+=12;
    if(m[3]==='AM' && h===12) h=0;
    return {h,min};
  }
  m=s.match(/^(\d{1,2}):(\d{2})/);

function parseAbsoluteTimestamp(stamp){

  }
  const m=s.match(/^(\d{4}-\d{2}-\d{2})[T\s](\d{2}:\d{2})(?::\d{2})?$/);
  if(m){
    const d=new Date(`${m[1]}T${m[2]}:00Z`);

function instantFromDateTimeInZone(date,time,tz){
  if(!date||!time||!tz) return null;
  const safeTz=isValidIanaTimeZone(tz)?tz:'America/New_York';
  const tm=parseTimeTo24(time);
  if(!tm) return null;
  let guess=Date.UTC(Number(date.slice(0,4)),Number(date.slice(5,7))-1,Number(date.slice(8,10)),tm.h,tm.min,0);
  for(let i=0;i<4;i++){
    const d=new Date(guess);
    const parts=new Intl.DateTimeFormat('en-CA',{timeZone:safeTz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hourCycle:'h23'}).formatToParts(d);
    const get=t=>parts.find(p=>p.type===t)?.value||'';
    const wallDate=`${get('year')}-${get('month')}-${get('day')}`;
    const wallHour=Number(get('hour')==='24'?'0':get('hour'));
    const wallMin=Number(get('minute')||0);
    const wall=Date.UTC(Number(wallDate.slice(0,4)),Number(wallDate.slice(5,7))-1,Number(wallDate.slice(8,10)),wallHour,wallMin,0);
    const target=Date.UTC(Number(date.slice(0,4)),Number(date.slice(5,7))-1,Number(date.slice(8,10)),tm.h,tm.min,0);
    const diff=target-wall;
    if(Math.abs(diff)<60000) return new Date(guess);
    guess+=diff;
  }
  const out=new Date(guess);
  return Number.isFinite(out.getTime())?out:null;
}
function sportsDbTimeInstant(eOrRow){

  }

}
function shortDateTimeInZone(d,tz){

function matchDateTime(m){

}
function matchUaeTimestamp(m){
  if(!m) return 0;
  const apiLike=!!(m.api||m.eventId||m.source==='live'||m.source==='api'||m.sourceDate||m.sourceTime||m.sourceTimestamp||m.strTimestamp||m.kickoffUtc);

function countdownText(m){

function dateKeyInZone(d,tz){

function formatInstantUserTz(ts){

  const tz=browserTimeZone(); const loc=LANG==='ar'?'ar-AE':'en-GB';
  const date=new Intl.DateTimeFormat(loc,{timeZone:tz,weekday:'short',day:'2-digit',month:'short'}).format(d);
  const time=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'numeric',minute:'2-digit',hour12:true}).format(d);
  return `${date} · ⁦${time} ${timeZoneShortName(tz,d)}⁩`;
}
function matchDateTime(m){
  if(!m) return '';
  const ts=matchUaeTimestamp(m);
  if(ts) return formatInstantUserTz(ts);
  const apiLike=!!(m.api||m.eventId||m.source==='live'||m.source==='api'||m.sourceDate||m.sourceTime||m.sourceTimestamp||m.strTimestamp||m.kickoffUtc);
  if(apiLike) return sportsDbSourceDisplayLabel(m);
  const date=(m&&m.uaeDate)||(m&&m.date)||'';
  const time=(m&&m.uaeTime)||(m&&m.time)||(m&&m.strTime?toAmPmFromHHMM(m.strTime):'');
  if(date&&time) return date+' · '+time+(m.tz?' '+m.tz:'');

}
function formatUaeDateTimeParts(){

  const date=new Intl.DateTimeFormat(loc,{timeZone:tz,weekday:'short',day:'2-digit',month:'short',year:'numeric'}).format(now);
  const time=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'numeric',minute:'2-digit',hour12:true}).format(now);
  return {date, time, tzLabel: timeZoneShortName(tz,now)};
}
function updateHeaderDateTime(){

  const dateEl=el.querySelector('.date'), timeEl=el.querySelector('.time');

  if(timeEl) timeEl.textContent=p.time;
