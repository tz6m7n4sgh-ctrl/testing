<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0a1f17"/>
<title>WC2026 Pick'em</title>
<style>
/* ===== Part 1: design tokens + mobile-first CSS (RTL-aware) ===== */
:root{
  --pitch:#0a1f17; --pitch2:#10362a; --line:#1d4a3a;
  --grass:#19c37d; --grass-d:#0f9d63;
  --gold:#f5c451; --gold-d:#caa033;
  --ink:#0c1512; --paper:#f6f8f7; --card:#ffffff; --muted:#5f7068;
  --soft:#eef2f0; --border:#dde6e2; --bad:#e2574c; --good:#19a96b; --warn:#e8a23b;
  --r:16px; --r-sm:10px; --shadow:0 2px 10px rgba(10,31,23,.08); --shadow-lg:0 8px 30px rgba(10,31,23,.16);
  --tap:46px; --maxw:560px;
  --sans:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,"Noto Sans Arabic",sans-serif;
  --num:"SF Mono",ui-monospace,"Roboto Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); background:var(--paper); color:var(--ink);
  line-height:1.45; font-size:15px;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
  overflow-x:hidden;
}
[dir="rtl"]{font-family:var(--sans)}
.num{font-family:var(--num);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:var(--grass-d);text-decoration:none}
h1,h2,h3,h4{margin:0;line-height:1.2}
.hide{display:none!important}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 14px}

/* Top bar */
.topbar{
  position:sticky;top:0;z-index:40;background:var(--pitch);color:#fff;
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
  display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);
}
.topbar .brand{font-weight:800;font-size:16px;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
.topbar .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--grass);box-shadow:0 0 0 4px rgba(25,195,125,.25)}
.topbar .spacer{flex:1}
.iconbtn{
  min-width:var(--tap);height:36px;padding:0 12px;border-radius:999px;
  background:rgba(255,255,255,.12);color:#fff;font-weight:700;font-size:13px;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
}
.iconbtn:active{transform:scale(.96)}
.iconbtn.gold{background:var(--gold);color:#3a2c05}

/* Phase strip */
.phase{
  background:linear-gradient(180deg,var(--pitch2),var(--pitch));color:#cdeee0;
  padding:8px 14px;font-size:12.5px;display:flex;gap:10px;align-items:center;justify-content:center;
  border-bottom:1px solid var(--line);
}
.phase b{color:#fff}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin:12px 0}
.card.flat{box-shadow:none}
.card h3{font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sub{color:var(--muted);font-size:12.5px}
.row{display:flex;align-items:center;gap:10px}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.grid{display:grid;gap:10px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:var(--soft);font-size:12px;font-weight:600;color:var(--muted)}
.chip.on{background:var(--grass);color:#04150d}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.tag.api{background:#e7f0ff;color:#2b5fb8}.tag.adm{background:#fff0d6;color:#9a6a00}
.tag.pend{background:#eee;color:#777}.tag.corr{background:#ffe3df;color:#b53a2e}
.tag.paid{background:#e2f7ec;color:#0f8a55}.tag.unpaid{background:#fdeceb;color:#c5392c}

/* Stat tiles */
.stat{background:var(--soft);border-radius:var(--r-sm);padding:12px;text-align:center}
.stat .v{font-family:var(--num);font-size:22px;font-weight:800;color:var(--pitch)}
.stat .l{font-size:11.5px;color:var(--muted);margin-top:2px}
.stat.gold{background:linear-gradient(160deg,#fff6e0,#ffedc2);border:1px solid #f0dca0}
.stat.gold .v{color:var(--gold-d)}

/* Buttons */
.btn{min-height:var(--tap);padding:0 16px;border-radius:12px;background:var(--grass);color:#04150d;font-weight:800;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:var(--soft);color:var(--ink)}
.btn.gold{background:var(--gold);color:#3a2c05}
.btn.bad{background:var(--bad);color:#fff}
.btn.sm{min-height:38px;font-size:13px;width:auto;padding:0 14px}
.btn[disabled]{opacity:.5;pointer-events:none}

/* Leaderboard rows */
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r-sm);background:var(--card);border:1px solid var(--border);margin:8px 0}
.lb-row .rank{font-family:var(--num);font-weight:800;font-size:17px;width:26px;text-align:center;color:var(--muted)}
.lb-row .nm{font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-row .pts{font-family:var(--num);font-weight:800;font-size:17px;color:var(--pitch)}
.lb-row.r1{border-color:var(--gold);background:linear-gradient(120deg,#fffdf5,#fff6e0)}
.lb-row.r1 .rank{color:var(--gold-d)}
.mv{font-family:var(--num);font-size:12px;font-weight:800;min-width:30px;text-align:center}
.mv.up{color:var(--good)}.mv.dn{color:var(--bad)}.mv.eq{color:var(--muted)}

/* Bottom nav */
.botnav{
  position:fixed;left:0;right:0;bottom:0;z-index:50;background:#fff;border-top:1px solid var(--border);
  display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
.botnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;color:var(--muted);font-size:10.5px;font-weight:700;border-radius:12px;min-height:var(--tap)}
.botnav button .ic{font-size:19px;line-height:1}
.botnav button.on{color:var(--grass-d)}
.botnav button.on .ic{transform:translateY(-1px)}

/* More menu sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(8,18,14,.5);z-index:60;display:none;align-items:flex-end}
.sheet-bg.open{display:flex}
.sheet{background:#fff;width:100%;max-width:var(--maxw);margin:0 auto;border-radius:18px 18px 0 0;padding:8px 14px calc(18px + env(safe-area-inset-bottom));max-height:84vh;overflow:auto;animation:up .22s ease}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet .grab{width:40px;height:4px;border-radius:9px;background:#d6ded9;margin:8px auto 12px}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 8px;border-radius:12px;font-weight:600;border-bottom:1px solid var(--soft)}
.menu-item:active{background:var(--soft)}
.menu-item .ic{font-size:18px;width:24px;text-align:center}
.menu-item.adm{color:var(--gold-d)}

/* Tables → cards */
.gtable{width:100%;border-collapse:collapse;font-size:13px}
.gtable th,.gtable td{padding:7px 6px;text-align:center;border-bottom:1px solid var(--soft)}
.gtable th{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase}
.gtable td.tn{text-align:start;font-weight:700;display:flex;align-items:center;gap:6px}
.gtable tr.q1 td:first-child{box-shadow:inset 3px 0 0 var(--grass)}
.gtable tr.q2 td:first-child{box-shadow:inset 3px 0 0 #6fd3aa}
.pos{font-family:var(--num);width:18px;height:18px;line-height:18px;border-radius:5px;background:var(--soft);font-size:11px;font-weight:800;text-align:center}

/* Match / impact cards */
.match{border:1px solid var(--border);border-radius:var(--r-sm);padding:11px;margin:8px 0;background:#fff}
.match .head{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:6px}
.teams{display:flex;align-items:center;justify-content:center;gap:10px;font-weight:700}
.teams .sc{font-family:var(--num);font-size:20px;font-weight:800;min-width:54px;text-align:center;background:var(--soft);border-radius:8px;padding:3px 8px}
.edge{margin-top:8px;font-size:12.5px;background:var(--soft);border-radius:8px;padding:7px 9px}
.edge b{color:var(--grass-d)}

/* SVG diagrams */
.diagram{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.barrow{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:12.5px}
.barrow .bn{width:92px;flex:none;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.barrow .bt{flex:1;height:14px;background:var(--soft);border-radius:7px;overflow:hidden}
.barrow .bf{height:100%;background:var(--grass);border-radius:7px}
.barrow .bv{font-family:var(--num);width:30px;text-align:end;font-weight:700;color:var(--muted)}

/* Bracket */
.bracket{display:flex;gap:14px;padding:6px 2px;min-width:max-content}
.bcol{display:flex;flex-direction:column;justify-content:space-around;gap:10px;min-width:150px}
.bcol h4{font-size:11px;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:4px}
.bmatch{background:#fff;border:1px solid var(--border);border-radius:9px;font-size:12px;overflow:hidden}
.bmatch .bt{padding:6px 8px;display:flex;justify-content:space-between;gap:6px}
.bmatch .bt+.bt{border-top:1px solid var(--soft)}
.bmatch .bt.win{background:#eafaf2;font-weight:800}

/* Inputs */
input,select,textarea{font-family:inherit;font-size:15px;width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:11px;background:#fff;color:var(--ink)}
textarea{min-height:96px;resize:vertical}
.score-in{width:54px;text-align:center;font-family:var(--num);font-weight:800;font-size:18px;padding:8px}
label{font-size:12.5px;color:var(--muted);font-weight:700;display:block;margin-bottom:5px}
.field{margin:10px 0}

/* States */
.state{text-align:center;padding:30px 16px;color:var(--muted)}
.spin{width:30px;height:30px;border:3px solid var(--soft);border-top-color:var(--grass);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.banner{padding:10px 12px;border-radius:11px;font-size:13px;font-weight:600;margin:10px 0;display:flex;gap:8px;align-items:center}
.banner.err{background:#fdeceb;color:#b53a2e}
.banner.warn{background:#fff6e6;color:#9a6a00}
.banner.ok{background:#e7f8ef;color:#0f8a55}
.banner.cache{background:#eef3ff;color:#3158a8}

/* Collapsible */
details.acc{border:1px solid var(--border);border-radius:var(--r-sm);margin:8px 0;background:#fff;overflow:hidden}
details.acc>summary{padding:12px;font-weight:700;list-style:none;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary::after{content:"▾";color:var(--muted);transition:.2s}
details.acc[open]>summary::after{transform:rotate(180deg)}
details.acc .body{padding:0 12px 12px}

/* Segmented */
.seg{display:flex;background:var(--soft);border-radius:11px;padding:3px;gap:3px;overflow-x:auto}
.seg button{flex:1;min-width:max-content;padding:8px 12px;border-radius:9px;font-weight:700;font-size:12.5px;color:var(--muted);white-space:nowrap}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}

/* AI */
.chips{display:flex;gap:7px;overflow-x:auto;padding:4px 0}
.chips button{white-space:nowrap;background:var(--soft);border-radius:999px;padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--ink)}
.ai-ans{background:var(--soft);border-radius:12px;padding:13px;white-space:pre-wrap;font-size:13.5px;margin-top:10px;line-height:1.55}
.ai-src{font-size:11px;color:var(--muted);margin-top:8px;font-style:italic}

/* RTL tweaks */
[dir="rtl"] .gtable td.tn{text-align:start}
[dir="rtl"] .lb-row .rank{text-align:center}
[dir="rtl"] .gtable tr.q1 td:first-child{box-shadow:inset -3px 0 0 var(--grass)}

@media(min-width:600px){ body{font-size:15.5px} .g3{grid-template-columns:repeat(3,1fr)} }
</style>
</head>

/* ================= team normalization ================= */
const _aliasIndex=(()=>{ const m={};
  for(const canon in TEAM_ALIASES){ m[norm(canon)]=canon; for(const a of TEAM_ALIASES[canon]) m[norm(a)]=canon; }
  return m;
})();
function norm(s){ return String(s==null?'':s).toLowerCase()
  .replace(/[._]/g,' ').replace(/&/g,' and ').replace(/[-–—]/g,' ')
  .replace(/[^\p{L}\p{N}\s]/gu,'').replace(/\s+/g,' ').trim(); }

/* canonical display name for a team string */
function canonTeam(team){
  if(team==null) return '';
  const n=norm(team);
  if(_aliasIndex[n]) return _aliasIndex[n];
  // try against GROUPS roster for canonical casing
  for(const g of GROUP_KEYS) for(const tm of GROUPS[g]) if(norm(tm)===n) return tm;
  return String(team).trim();
}
/* stable compare key — two names referring to same team share a key */
function teamCompareKey(team){ return norm(canonTeam(team)); }
function sameTeam(a,b){ return teamCompareKey(a)===teamCompareKey(b) && teamCompareKey(a)!==''; }

/* normalize a prediction (array OR object {1:..}) → array length up to 4 */
function normalizePrediction(pred){
  if(pred==null) return [];
  if(Array.isArray(pred)) return pred.filter(x=>x!=null&&x!=='').map(canonTeam);
  if(typeof pred==='object'){
    const out=[];
    for(let i=1;i<=4;i++){ if(pred[i]!=null&&pred[i]!=='') out[i-1]=canonTeam(pred[i]); }
    // fall back to any numeric-ish keys
    if(out.filter(Boolean).length===0){
      Object.keys(pred).sort().forEach(k=>{ if(pred[k]) out.push(canonTeam(pred[k])); });
    }
    return out.filter(Boolean);
  }
  return [];
}

/* tolerant access to a player's group prediction regardless of stored shape */
function playerGroupPred(playerData,group){
  if(!playerData) return [];
  const buckets=[playerData.groups, playerData.predictions, playerData.groupPredictions, playerData];
  for(const b of buckets){ if(b && b[group]!=null) return normalizePrediction(b[group]); }
  return [];
}
/* team at a given 1-based position in a prediction */
function groupPredPick(pred,pos){ const a=normalizePrediction(pred); return a[pos-1]||null; }
/* 1-based rank of a team within a player's group prediction, or 0 if absent */
function rankOfTeamInPred(playerData,group,team){
  const a=playerGroupPred(playerData,group);
  for(let i=0;i<a.length;i++) if(sameTeam(a[i],team)) return i+1;
  return 0;
}
/* which group a match belongs to, from a match key like "B_2" or {group} */
function groupForMatch(match){
  if(typeof match==='string'){ const m=match.split('_'); return m[0]; }
  if(match&&match.group) return match.group;
  return null;
}

/* player list helpers */
function playerNames(){ return Object.keys(APP.data.players||{}); }

/* ---- group match model ---- */
function matchTeams(group,idx){ const g=GROUPS[group]||[]; const p=RR[idx]; return p?[g[p[0]],g[p[1]]]:[null,null]; }
function matchKey(group,idx){ return group+'_'+idx; }
function readScore(res){
  if(!res) return null;
  const h=res.home, a=res.away;
  if(h==null||a==null||h===''||a==='') return null;
  const hs=Number(h), as=Number(a);
  if(!Number.isFinite(hs)||!Number.isFinite(as)) return null;
  return {hs,as};
}
function matchResult(group,idx){
  const [home,away]=matchTeams(group,idx);
  const sc=readScore((APP.data.groupResults||{})[matchKey(group,idx)]);
  if(!sc) return {home,away,complete:false};
  let winner=null,outcome='draw';
  if(sc.hs>sc.as){winner=home;outcome='home';} else if(sc.as>sc.hs){winner=away;outcome='away';}
  return {home,away,hs:sc.hs,as:sc.as,winner,outcome,complete:true};
}
function groupComplete(group){ for(let i=0;i<6;i++) if(!matchResult(group,i).complete) return false; return true; }
function completedMatchCount(){ let n=0; for(const g of GROUP_KEYS) for(let i=0;i<6;i++) if(matchResult(g,i).complete) n++; return n; }

/* ---- actual standings for a group ---- */
function computeGroupTable(group){
  const teams=GROUPS[group]||[];
  const row={}; teams.forEach(tm=>row[tm]={team:tm,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0});
  for(let i=0;i<6;i++){ const r=matchResult(group,i); if(!r.complete) continue;
    const H=row[r.home],A=row[r.away]; if(!H||!A) continue;
    H.P++;A.P++; H.GF+=r.hs;H.GA+=r.as; A.GF+=r.as;A.GA+=r.hs;
    if(r.outcome==='home'){H.W++;A.L++;H.Pts+=3;}
    else if(r.outcome==='away'){A.W++;H.L++;A.Pts+=3;}
    else {H.D++;A.D++;H.Pts++;A.Pts++;}
  }
  const arr=Object.values(row); arr.forEach(x=>x.GD=x.GF-x.GA);
  arr.sort((a,b)=> b.Pts-a.Pts || b.GD-a.GD || b.GF-a.GF || a.team.localeCompare(b.team));
  return arr;
}

/* ---- predicted edge for a match by a player ---- */
function predictedEdge(playerData,group,home,away){
  const rh=rankOfTeamInPred(playerData,group,home);
  const ra=rankOfTeamInPred(playerData,group,away);
  if(!rh&&!ra) return {status:'none'};
  if(!rh||!ra) return {status:'missing',missing:!rh?home:away,rh,ra};
  if(rh===ra) return {status:'tie',rh,ra};
  return {status:'ok', edge: rh<ra?home:away, rh, ra};
}

/* ===== SINGLE SOURCE OF TRUTH: calcPlayerPoints ===== */
function calcPlayerPoints(playerData,groupResults,knockoutResults,champion){
  const detail={ matches:[], ranking:[], knockout:[], champion:null };
  let gMatch=0,gRank=0,ko=0,champ=0,gRankPending=false;

  for(const g of GROUP_KEYS){
    for(let i=0;i<6;i++){
      const r=matchResult(g,i); if(!r.complete) continue;
      const e=predictedEdge(playerData,g,r.home,r.away);
      let got=0,reason='';
      if(r.outcome==='draw'){ reason='draw_no_edge'; }
      else if(e.status==='ok'){ if(sameTeam(e.edge,r.winner)){got=SCORING.edgeCorrect;reason='edge_correct';} else reason='edge_wrong'; }
      else if(e.status==='missing'){ reason='missing_team'; }
      else if(e.status==='none'){ reason='no_pred'; }
      else reason='equal_rank';
      gMatch+=got;
      detail.matches.push({key:matchKey(g,i),group:g,idx:i,home:r.home,away:r.away,hs:r.hs,as:r.as,winner:r.winner,outcome:r.outcome,edge:e,got,reason});
    }
    // ranking points only when group complete
    if(groupComplete(g)){
      const table=computeGroupTable(g);
      const pred=playerGroupPred(playerData,g);
      for(let pos=0;pos<4;pos++){
        const actualTeam=table[pos]?table[pos].team:null;
        const predTeam=pred[pos]||null;
        let got=0,reason='miss';
        if(predTeam&&actualTeam&&sameTeam(predTeam,actualTeam)){got=SCORING.exactPosition;reason='exact';}
        else if(predTeam && table.some(rw=>sameTeam(rw.team,predTeam))){got=SCORING.teamInGroupWrongPos;reason='in_group';}
        gRank+=got;
        detail.ranking.push({group:g,pos:pos+1,predTeam,actualTeam,got,reason});
      }
    } else if(playerGroupPred(playerData,g).length){ gRankPending=true; }
  }

  // knockout
  const kr=knockoutResults||{};
  const kp=(playerData&&(playerData.knockout||playerData.knockoutPredictions))||{};
  for(const mid in kr){
    const actualW=kr[mid]; if(!actualW) continue;
    const round=(mid.split('_')[0]||'').toUpperCase();
    const val=SCORING.knockout[round]||0;
    const predW=kp[mid];
    const got=(predW&&sameTeam(predW,actualW))?val:0;
    ko+=got;
    detail.knockout.push({mid,round,predW:predW||null,actualW,got});
  }

  // champion
  if(champion){
    const pc=playerData&&playerData.champion;
    const got=(pc&&sameTeam(pc,champion))?SCORING.champion:0;
    champ=got;
    detail.champion={predW:pc||null,actual:champion,got};
  }

  return { total:gMatch+gRank+ko+champ, groupMatch:gMatch, groupRank:gRank, knockout:ko, champ, gRankPending, detail };
}

/* ---- leaderboard (uses calcPlayerPoints) ---- */
function buildLeaderboard(){
  const rows=playerNames().map(name=>{
    const p=getPlayer(name);
    const c=calcPlayerPoints(p,APP.data.groupResults,APP.data.knockoutResults,APP.data.champion);
    return {name, ...c, paid:!!(p&&p.paid)};
  });
  rows.sort((a,b)=> b.total-a.total || a.name.localeCompare(b.name));
  rows.forEach((r,i)=>r.rank=i+1);
  return rows;
}
function rankMovement(name){
  const cur=buildLeaderboard().find(r=>r.name===name);
  const prev=APP.prevRanks&&APP.prevRanks[name];
  if(!cur||!prev) return {dir:'eq',delta:0};
  const d=prev-cur.rank;
  return {dir:d>0?'up':d<0?'dn':'eq', delta:Math.abs(d)};
}
function snapshotRanks(){ const m={}; buildLeaderboard().forEach(r=>m[r.name]=r.rank); APP.prevRanks=m; localStorage.setItem('wc2026_ranks',JSON.stringify(m)); }

/* ---- prize pool ---- */
function prizePool(){ const fee=APP.data.settings.entryFeeAED||200; return playerNames().length*fee; }
function paidCounts(){ let paid=0; playerNames().forEach(n=>{if(getPlayer(n).paid)paid++;}); return {paid,unpaid:playerNames().length-paid}; }
function prizeSplit(){
  const pool=prizePool(), mode=APP.data.settings.distribution||'winnerTakesAll';
  const lb=buildLeaderboard();
  if(mode==='split2') return [{name:lb[0],share:.6},{name:lb[1],share:.4}].filter(x=>x.name).map(x=>({name:x.name.name,amount:Math.round(pool*x.share)}));
  if(mode==='split3') return [[lb[0],.5],[lb[1],.3],[lb[2],.2]].filter(x=>x[0]).map(x=>({name:x[0].name,amount:Math.round(pool*x[1])}));
  return lb[0]?[{name:lb[0].name,amount:pool}]:[];
}

/* ================= schedule ================= */
function buildLocalSchedule(){ // synthesize from GROUPS so All-Matches always has data

}
function dateRange(a,b){ const out=[],d=new Date(a),end=new Date(b);
  while(d<=end){ out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1);} return out; }

/* ================= audit + data quality ================= */
function validateGroupPrediction(group,pred){
  const a=normalizePrediction(pred); const issues=[];
  const roster=(GROUPS[group]||[]).map(canonTeam);
  if(a.length===0){ issues.push({type:'nullPred'}); return issues; }
  if(a.length<4) issues.push({type:'only3',have:a.length});
  const seen={}; a.forEach(tm=>{ const k=teamCompareKey(tm); if(seen[k]) issues.push({type:'dupTeams',team:tm}); seen[k]=1; });
  a.forEach(tm=>{ if(!roster.some(r=>sameTeam(r,tm))) issues.push({type:'invalidTeam',team:tm}); });
  const missing=roster.filter(r=>!a.some(tm=>sameTeam(tm,r)));
  if(missing.length && a.length<4) issues.push({type:'missingPicks',missing});
  return issues;
}
function auditDataQuality(){
  const out=[];
  playerNames().forEach(name=>{ const p=getPlayer(name);
    GROUP_KEYS.forEach(g=>{ const raw=(p.groups&&p.groups[g])??(p.predictions&&p.predictions[g])??p[g];
      const issues=validateGroupPrediction(g,raw);
      issues.forEach(is=>out.push({player:name,group:g,raw,issue:is}));
    });
  });
  return out;
}
function auditPlayer(name){
  const p=getPlayer(name); if(!p) return null;
  return { name, calc:calcPlayerPoints(p,APP.data.groupResults,APP.data.knockoutResults,APP.data.champion) };
}
function auditMatch(group,idx){
  const r=matchResult(group,idx); const rows=[];
  playerNames().forEach(name=>{ const p=getPlayer(name);
    const e=predictedEdge(p,group,r.home,r.away);
    let got=0; if(r.complete&&r.outcome!=='draw'&&e.status==='ok'&&sameTeam(e.edge,r.winner)) got=SCORING.edgeCorrect;
    rows.push({name,edge:e,got});
  });
  return {match:r,group,idx,rows};
}
function auditGroupRanking(group){
  const table=computeGroupTable(group), complete=groupComplete(group), rows=[];
  playerNames().forEach(name=>{ const p=getPlayer(name); const pred=playerGroupPred(p,group); const cells=[];
    for(let pos=0;pos<4;pos++){ const at=table[pos]?table[pos].team:null,pt=pred[pos]||null;
      let got=0,st='miss'; if(complete&&pt&&at&&sameTeam(pt,at)){got=SCORING.exactPosition;st='exact';}
      else if(complete&&pt&&table.some(rw=>sameTeam(rw.team,pt))){got=SCORING.teamInGroupWrongPos;st='in_group';}
      cells.push({pos:pos+1,pt,at,got,st}); }
    rows.push({name,cells});
  });
  return {group,table,complete,rows};
}
function buildPredictionAudit(){
  const lb=buildLeaderboard();
  return { players:lb, quality:auditDataQuality(),
    totalsMatch: lb.every(r=>r.total===r.groupMatch+r.groupRank+r.knockout+r.champ) };
}

/* ================= repair: missing team (append only) ================= */
function previewRepairMissingTeam(name,group){
  const p=getPlayer(name); if(!p) return null;
  const cur=playerGroupPred(p,group);
  const roster=(GROUPS[group]||[]).map(canonTeam);
  const missing=roster.filter(r=>!cur.some(tm=>sameTeam(tm,r)));
  if(cur.length>=4||missing.length===0) return {name,group,before:cur,after:cur,missing:[],noop:true};
  const after=cur.concat(missing).slice(0,4);
  return {name,group,before:cur,after,missing,noop:false};
}
function applyRepairMissingTeam(name,group){
  const pv=previewRepairMissingTeam(name,group); if(!pv||pv.noop) return false;
  backupBeforeRepair('repair');
  const p=getPlayer(name);
  if(!p.groups) p.groups={};
  const before=p.groups[group]!==undefined?p.groups[group]:(p[group]!==undefined?p[group]:null);
  p.groups[group]=pv.after;
  logAction('repair_missing_team','players.'+name+'.groups.'+group, before, pv.after);
  return true;
}

/* ================= KNOCKOUT BRACKET ================= */
function koSeed(){ // fill R32 from standings when all groups complete
  if(!GROUP_KEYS.every(groupComplete)) return null;
  const winners={},runners={},thirds=[];
  GROUP_KEYS.forEach(g=>{ const tb=computeGroupTable(g); winners[g]=tb[0]?.team; runners[g]=tb[1]?.team;
    if(tb[2]) thirds.push({group:g,team:tb[2].team,pts:tb[2].Pts,gd:tb[2].GD,gf:tb[2].GF}); });
  thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const best8=thirds.slice(0,8).map(x=>x.team);
  // placeholder pairing: admin can override via knockoutMatches
  const seeds=[...Object.values(winners),...Object.values(runners),...best8];
  const pairs=[]; for(let i=0;i<seeds.length;i+=2) pairs.push([seeds[i],seeds[i+1]]);
  return pairs.slice(0,16);
}
function viewKnockout(){
  const seeded=koSeed();
  const km=APP.data.knockoutMatches||{};
  const r32=(km.R32&&km.R32.length)?km.R32:(seeded||[]);
  if(!r32.length) return `<div class="card"><h3>🎯 ${esc(t('v_knockout'))}</h3><div class="state">${esc(t('bracketPending'))}</div></div>`;
  const rounds=[['R32',r32]];
  ['R16','QF','SF','F'].forEach(rk=>{ if(km[rk]&&km[rk].length) rounds.push([rk,km[rk]]); });
  return `<div class="card"><div class="between"><h3>🎯 ${esc(t('v_knockout'))}</h3>
      ${APP.isAdmin?`<button class="btn ghost sm" onclick="go('results')">✏️</button>`:''}</div>

/* ---- routed Q&A ---- */
function answerLeaderboardQuestion(ctx){
  if(!ctx.players.length) return t('noData')+aiSource('from_appdata');
  const top=ctx.players.slice(0,5).map(p=>`${p.rank}. ${p.name} — ${p.total} ${t('pts')}`).join('\n');
  return `🏆 ${t('v_leaderboard')}\n${top}`+aiSource('from_calc');
}
function answerPlayerPointsQuestion(ctx,q){
  const p=ctx.players.find(x=>q.toLowerCase().includes(x.name.toLowerCase()));
  if(!p) return answerLeaderboardQuestion(ctx);
  return `👤 ${p.name} — #${p.rank}, ${p.total} ${t('pts')}\n• ${t('groupMatchPts')}: ${p.groupMatch}\n• ${t('groupRankPts')}: ${p.groupRank}\n• ${t('koPts')}: ${p.knockout}\n• ${t('champPts')}: ${p.champ}`+aiSource('from_calc');
}
function answerPredictionQuestion(ctx){
  const c=ctx.champConsensus.map(x=>`${x.key}: ${x.count}`).join('\n')||t('noData');
  return `👑 ${t('champConsensus')}\n${c}`+aiSource('from_appdata');
}
function answerScheduleQuestion(ctx){
  if(!ctx.today.length) return t('noToday')+aiSource('from_api');
  return `📅 ${t('todayMatches')}\n`+ctx.today.map(m=>`${m.home} vs ${m.away} (${m.group})`).join('\n')+aiSource('from_api');
}
function answerPrizeQuestion(ctx){
  let s=`💰 ${t('prizePool')}: ${ctx.prizePool} ${ctx.currency}\n${t('players')}: ${ctx.players.length} × ${ctx.entryFee} ${ctx.currency}`;
  if(ctx.isAdmin&&ctx.paidCounts) s+=`\n${t('paid')}: ${ctx.paidCounts.paid} · ${t('unpaid')}: ${ctx.paidCounts.unpaid}`;
  const split=prizeSplit().map(p=>`${p.name}: ${fmtAED(p.amount)}`).join('\n');
  if(split) s+=`\n${t('projWinner')}:\n${split}`;
  return s+aiSource('from_calc');
}
function answerPaymentQuestion(ctx){
  if(!ctx.isAdmin) return t('adminOnly')+aiSource('from_appdata');
  const unpaid=ctx.players.filter(p=>p.paid===false).map(p=>p.name);
  return `${t('unpaid')} (${unpaid.length}):\n`+(unpaid.join('\n')||t('none'))+aiSource('from_admin');
}

function answerLocalAI(question,mode,language){
  const ctx=buildSafeAIContext(); const q=(question||'').toLowerCase();
  if(mode==='write') return generateWritingResponse(ctx,question,language);
  const has=(...ws)=>ws.some(w=>q.includes(w));
  if(has('prize','pool','جائزة','جوائز')) return answerPrizeQuestion(ctx);
  if(has('paid','pay','unpaid','دفع','يدفع')) return answerPaymentQuestion(ctx);
  if(has('lead','top','winning','first','متصدر','الأول','يتصدر')) return answerLeaderboardQuestion(ctx);
  if(has('champion','winner pick','بطل','يتوقع البطل')) return answerPredictionQuestion(ctx);
  if(has('today','match today','اليوم','مباريات اليوم')) return answerScheduleQuestion(ctx);
  if(ctx.players.some(p=>q.includes(p.name.toLowerCase()))) return answerPlayerPointsQuestion(ctx,question);
  if(has('point','score','نقاط','نقطة')) return answerLeaderboardQuestion(ctx);
  return answerLeaderboardQuestion(ctx);
}

/* ---- writing mode ---- */
function generateWritingResponse(ctx,question,language){
  const ar=language==='ar';
  const lb=ctx.players, leader=lb[0];
  const q=(question||'').toLowerCase();
  if(q.includes('prize')||q.includes('pay')||q.includes('جائزة')||q.includes('دفع')){
    return ar
      ? `🏆 *سحب كأس العالم 2026*\nمجموع الجوائز الآن: ${ctx.prizePool} ${ctx.currency} (${lb.length} مشترك × ${ctx.entryFee}).\nالمتصدر: ${leader?leader.name:'—'}.\nذكّروا من لم يدفع رسوم الاشتراك 🙏`
      : `🏆 *WC2026 Pick'em*\nPrize pool: ${ctx.prizePool} ${ctx.currency} (${lb.length} × ${ctx.entryFee}).\nLeader: ${leader?leader.name:'—'}.\nPlease settle the 200 AED entry fee if you haven't 🙏`;
  }
  // default: leaderboard / matchday update
  const top=lb.slice(0,5).map((p,i)=>`${['🥇','🥈','🥉','4️⃣','5️⃣'][i]} ${p.name} — ${p.total}`).join('\n');
  return ar
    ? `⚽ *تحديث الترتيب*\n${top}\n\nمباريات اليوم: ${ctx.today.length}. حظاً موفقاً للجميع! 🔥`
    : `⚽ *Leaderboard update*\n${top}\n\nToday's matches: ${ctx.today.length}. Good luck everyone! 🔥`;
}

    <div class="row" style="gap:8px;margin-top:8px">
      <button class="btn" onclick="askAI($('aiBox').value)">${esc(t('v_ai'))}</button>
      <button class="btn ghost sm" onclick="$('aiBox').value='';$('aiAns').innerHTML=''">${esc(t('clear'))}</button>
    </div>
    <div id="aiAns"></div>
  </div>`;
}
function askAI(q){ if(!q||!q.trim()) return;
  const ans=answerLocalAI(q,APP.sel.aiMode||'text',LANG);
  $('aiAns').innerHTML=`<div class="ai-ans">${esc(ans)}</div>
    <button class="btn ghost sm" style="margin-top:8px" onclick='copyText(${JSON.stringify(ans)})'>${esc(t('copy'))}</button>`;
}

/* ================= admin auth ================= */
function adminHash(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h.toString(16); }
const ADMIN_HASH='13d38d1'; // hash of 'admin2026' — change via adminHash('newPassword') in console
function openAdmin(){
  if(APP.isAdmin){ openMore(); return; }
  openSheet(`<h3 style="padding:0 8px">🔒 ${esc(t('pwPrompt'))}</h3>
    <input id="pwIn" type="password" placeholder="${esc(t('pwPrompt'))}" autocomplete="off"/>
    <button class="btn" style="margin-top:10px" onclick="tryAdmin()">${esc(t('confirm'))}</button>`);
  setTimeout(()=>$('pwIn')?.focus(),100);
}
function tryAdmin(){ const v=$('pwIn').value;
  if(adminHash(v)===ADMIN_HASH){ APP.isAdmin=true; sessionStorage.setItem(ADMIN_FLAG,'1'); closeSheet(); toast(t('admin')); render(); }
  else toast(t('wrongPw')); }
function logoutAdmin(){ APP.isAdmin=false; sessionStorage.removeItem(ADMIN_FLAG); render(); }

/* ================= language ================= */
function toggleLang(){ LANG=LANG==='ar'?'en':'ar'; localStorage.setItem('wc_lang',LANG); render(); }

/* ================= schedule loaders ================= */
async function loadToday(){
  APP._todayLoading=true; if(APP.view==='today'||APP.view==='dashboard') render();
  const date=uaeToday();
  const ev=await fetchDay(date);
  // map API events onto local fixtures when possible; otherwise show local fixtures dated today
  const local=buildLocalSchedule().filter(m=>m.date===date);
  APP._today = ev.length? ev.map(e=>({group:groupFromEvent(e),home:e.strHomeTeam,away:e.strAwayTeam,date,key:null,idx:null}))
    : local;
  APP._todayLoading=false; render();
}
function groupFromEvent(e){ const home=e.strHomeTeam;
  for(const g of GROUP_KEYS) if((GROUPS[g]||[]).some(tm=>sameTeam(tm,home))) return g; return null; }
async function doFetchSchedule(){
  APP._schedLoading=true; render();
  const ev=await fetchFullSchedule((i,n)=>{ if(i%7===0){} });
  if(ev.length){ APP._schedule=ev.map(e=>({group:groupFromEvent(e),home:e.strHomeTeam,away:e.strAwayTeam,
      date:(e.dateEvent||''),key:null,idx:null})); toast(t('saved')); }
  else { APP._schedule=buildLocalSchedule(); toast(t('syncFail')); }
  APP._schedLoading=false; render();
}

/* ================= boot ================= */
async function boot(){
  APP.loaded=false; render();
  try{ const r=localStorage.getItem('wc2026_ranks'); if(r) APP.prevRanks=JSON.parse(r); }catch(_){}
  if(sessionStorage.getItem(ADMIN_FLAG)==='1') APP.isAdmin=true;
  await loadState();
  APP._schedule=buildLocalSchedule();
  render();
  loadToday();
}
window.addEventListener('online',()=>{ if(APP.cached) boot(); });
boot();
</script>
